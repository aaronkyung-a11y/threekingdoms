function startBattle(atkId, defId, atkPicks, defPicks){
  closeModal();
  const atk=G.cities[atkId], def=G.cities[defId];
  B.active=true; B.atkCity=atkId; B.defCity=defId; B.turn=1; B.sel=null; B.duelDone=false;
  B.playerSide = defPicks ? 'def' : 'atk'; // 플레이어가 조작하는 쪽
  B.phase = B.playerSide; // 플레이어 페이즈 먼저
  B.atkGarrison=0; B.defGarrison=0;
  B.weather='맑음'; B.windDir=0; B.eventLog=[]; // 천기 상태
  // === 지형 생성: 방어 도시의 실제 지리 프로파일 반영 ===
  B.hexes=[];
  for(let col=0;col<HEX.cols;col++)for(let row=0;row<HEX.rows;row++){
    B.hexes.push({col,row,terr:'plain'});
  }
  const prof = cityTerrainProfile(def.name);
  B.terrainName = prof.label;
  // 강: 프로파일의 강 개수만큼 세로 줄기
  for(let r=0;r<prof.rivers;r++){
    let cc=2+Math.floor(Math.random()*(HEX.cols-4));
    for(let row=0;row<HEX.rows;row++){
      cc=Math.max(1,Math.min(HEX.cols-2, cc+(Math.random()<0.55?0:(Math.random()<0.5?-1:1))));
      const h=hexAt(cc,row); if(h) h.terr='river';
      if(Math.random()<0.3){ const h2=hexAt(cc+1,row); if(h2&&h2.terr==='plain') h2.terr='river'; } // 넓은 강
    }
  }
  // 산/구릉: 프로파일 hillDensity
  const hillClusters=prof.hillClusters;
  for(let k=0;k<hillClusters;k++){
    const cx=1+Math.floor(Math.random()*(HEX.cols-2)), cy=Math.floor(Math.random()*HEX.rows);
    for(const h of B.hexes){ if(Math.abs(h.col-cx)+Math.abs(h.row-cy)<=1+Math.floor(Math.random()*2) && h.terr==='plain' && Math.random()<0.75) h.terr='hill'; }
  }
  // 숲 군집
  for(let k=0;k<prof.forestClusters;k++){
    const cx=2+Math.floor(Math.random()*(HEX.cols-4)), cy=1+Math.floor(Math.random()*(HEX.rows-2));
    for(const h of B.hexes){ if(Math.abs(h.col-cx)+Math.abs(h.row-cy)<=1 && h.terr==='plain' && Math.random()<0.7) h.terr='forest'; }
  }
  // 잔여 산발
  for(const h of B.hexes){ if(h.terr==='plain' && Math.random()<prof.scatter) h.terr = Math.random()<0.5?'hill':'forest'; }

  // 세로로 고르게 배치하는 헬퍼
  const placeRows=(n)=>{ const rows=[]; for(let i=0;i<n;i++){ rows.push(Math.round((i+1)*HEX.rows/(n+1))); } return rows; };
  B.units=[];
  // === 공격측 편성 ===
  if(atkPicks && atkPicks.length){
    const total=atkPicks.reduce((s,p)=>s+p.troops,0);
    B.atkSent=total; B.atkGarrison=atk.troops-total;
    const rows=placeRows(atkPicks.length);
    atkPicks.forEach((p,i)=>{
      const g=G.generals.find(x=>x.id===p.genId);
      const u=makeUnit(g, p.troops, atk.train, 'atk', i%2, rows[i]); u.tt=p.ttype; B.units.push(u);
    });
  } else {
    const atkGens=G.generals.filter(g=>g.cityId===atkId).slice(0,4);
    const atkTroops=atk.troops; B.atkSent=atkTroops; B.atkGarrison=0;
    const rows=placeRows(Math.max(1,atkGens.length));
    atkGens.forEach((g,i)=>{ B.units.push(makeUnit(g, Math.floor(atkTroops/atkGens.length), atk.train, 'atk', i%2, rows[i])); });
    if(!atkGens.length && atkTroops>0) B.units.push(makeUnit(null, atkTroops, atk.train, 'atk', 0, Math.floor(HEX.rows/2)));
  }
  // === 방어측 편성 ===
  if(defPicks && defPicks.length){
    const total=defPicks.reduce((s,p)=>s+p.troops,0);
    B.defSent=total; B.defGarrison=def.troops-total;
    const rows=placeRows(defPicks.length);
    defPicks.forEach((p,i)=>{
      const g=G.generals.find(x=>x.id===p.genId);
      const u=makeUnit(g, p.troops, def.train, 'def', HEX.cols-1-(i%2), rows[i]); u.tt=p.ttype; B.units.push(u);
    });
  } else {
    const defGens=G.generals.filter(g=>g.cityId===defId).slice(0,4);
    const defTroops=def.troops; B.defSent=defTroops; B.defGarrison=0;
    const rows=placeRows(Math.max(1,defGens.length));
    defGens.forEach((g,i)=>{ B.units.push(makeUnit(g, Math.floor(defTroops/Math.max(1,defGens.length)), def.train, 'def', HEX.cols-1-(i%2), rows[i])); });
    if(!defGens.length && defTroops>0) B.units.push(makeUnit(null, defTroops, def.train, 'def', HEX.cols-1, Math.floor(HEX.rows/2)));
  }

  // === 우호 무장 사기 보너스 (같은 편 상성) ===
  ['atk','def'].forEach(side=>{
    const ab=allyMoraleBonus(B.units, side);
    if(ab.bonus>0){
      B.units.filter(u=>u.side===side).forEach(u=>{ u.morale=Math.min(120, u.morale+ab.bonus); });
      if(side===B.playerSide && ab.pairs.length){
        const p=ab.pairs[0];
        B.allyBondMsg = `${p.a}·${p.b} ${REL_LABEL[p.type]} — 사기 상승!`;
      }
    }
  });

  document.getElementById('battle').classList.add('show');
  closeModal(); // 안전장치: 전투 진입 시 잔여 모달 확실히 닫기
  const roleTxt = (B.playerSide==='def' ? `🛡️ ${def.name} 방어전` : `${atk.name}→${def.name}`) + ` · ${B.terrainName||''}`;
  document.getElementById('btitle').textContent=roleTxt;
  resetBattleView();
  renderBattle();
  // 개전 대사 (플레이어측 대표 무장)
  const leadUnit = B.units.find(u=>u.side===B.playerSide && u.gen);
  const cry = leadUnit ? genLine(leadUnit.gen, 'battle') : '';
  const sideTxt = B.playerSide==='def' ? '당신은 <b>수비측</b>입니다. ' : '';
  let intro = sideTxt;
  if(cry) intro += `<b style="color:${personaColor(leadUnit.gen)}">${leadUnit.name}: "${cry}"</b><br>`;
  if(B.allyBondMsg) intro += `<span style="color:#8fd">🤝 ${B.allyBondMsg}</span><br>`;
  intro += '부대 선택 → 이동/공격. 무장끼리 인접하면 <b style="color:#f88">⚔️ 일기토</b> 버튼으로 도전!';
  binfo(intro);
  sfx('start'); haptic(30);
  setBgmMode('battle'); // 전투 음악
  initBattleControls();
  B.collapsed={};
  applyWeatherStart(); // 천기 발동
}
function makeUnit(gen, troops, train, side, col, row){
  const tt = gen? troopType(gen) : TROOP_TYPES.inf;
  return {
    id:'u'+Math.random().toString(36).slice(2,7),
    gen, name: gen?gen.name:'병사', troops, maxTroops:troops,
    train, morale:100, side, col, row,
    moved:false, acted:false,
    war: gen?gen.war:50, lead: gen?gen.lead:50, int: gen?gen.int:50,
    tt: tt.key, // 병과 key
    status:{}, // 상태이상: confuse(혼란 턴), burn(화상 턴), inspired(각성 턴)
    stratUsed:false, // 이번 전투 계략 사용 여부
    rallied:false, // 영웅 각성 발동 여부
  };
}
function unitTT(u){ return TROOP_TYPES[u.tt] || TROOP_TYPES.inf; }
function enemySide(){ return B.playerSide==='atk'?'def':'atk'; }
function isPlayerUnit(u){ return u.side===B.playerSide; }
function playerUnits(){ return B.units.filter(u=>u.side===B.playerSide && u.troops>0); }
function enemyUnits(){ return B.units.filter(u=>u.side===enemySide() && u.troops>0); }

function terrainColor(t){
  return {plain:'#5a6b3a', forest:'#2f4a26', hill:'#7a6540', river:'#2f5a7a'}[t];
}
function terrainDefBonus(t){ return {plain:0,forest:0.2,hill:0.3,river:-0.1}[t]; }
function terrainMoveCost(t){ return {plain:1,forest:2,hill:2,river:3}[t]; }

function renderBattle(){
  const svg=document.getElementById('bsvg');
  const s=HEX.size; let h='';
  // hexes
  for(const hx of B.hexes){
    const {x,y}=axialToPixel(hx.col,hx.row);
    const pts=hexPoints(x,y,s*0.95);
    const isMove = B.sel && canMoveTo(B.sel, hx);
    const isAtk = B.sel && canAttackTo(B.sel, hx);
    let stroke='#2a2318', sw=1;
    if(isMove){ stroke='#d4af37'; sw=2; }
    if(isAtk){ stroke='#e04040'; sw=2.5; }
    h+=`<polygon class="hex" data-col="${hx.col}" data-row="${hx.row}" points="${pts}"
      fill="${terrainColor(hx.terr)}" stroke="${stroke}" stroke-width="${sw}" opacity="0.9"/>`;
  }
  // units
  for(const u of B.units){
    if(u.troops<=0) continue;
    const {x,y}=axialToPixel(u.col,u.row);
    const tt=unitTT(u);
    const col = isPlayerUnit(u)?'#3a6ea5':'#a83232';
    const ttCol = {cav:'#ff8080',inf:'#80c0ff',arc:'#80ffaa'}[u.tt];
    const selRing = (B.sel && B.sel.id===u.id)?'<circle cx="'+x+'" cy="'+y+'" r="'+(s*0.85)+'" fill="none" stroke="#fff" stroke-width="2.5"/>':'';
    // 상태이상 아이콘
    let st=''; if(u.status){ if(u.status.burn)st+='🔥'; if(u.status.confuse)st+='💫'; if(u.status.taunted)st+='🎣'; if(u.status.inspired)st+='✨'; }
    const stTag = st? `<text class="hexunit-label" x="${x}" y="${y-16}" style="font-size:10px">${st}</text>`:'';
    const inspRing = (u.status&&u.status.inspired)?'<circle cx="'+x+'" cy="'+y+'" r="'+(s*0.72)+'" fill="none" stroke="#ffd234" stroke-width="2"/>':'';
    h+=`<g class="hexunit" data-uid="${u.id}">
      ${inspRing}
      <circle cx="${x}" cy="${y}" r="${s*0.62}" fill="${col}" stroke="${ttCol}" stroke-width="2.5" opacity="${u.acted?0.55:1}"/>
      <text class="hexunit-label" x="${x}" y="${y-6}" style="font-size:11px">${tt.icon}</text>
      <text class="hexunit-label" x="${x}" y="${y+5}">${u.name}</text>
      <text class="hexunit-label" x="${x}" y="${y+15}" style="font-size:8px">${(u.troops/1000).toFixed(1)}천</text>
      ${stTag}${selRing}</g>`;
  }
  svg.innerHTML=h;
  svg.querySelectorAll('.hex').forEach(n=>{
    n.addEventListener('click',()=>onHexClick(parseInt(n.dataset.col),parseInt(n.dataset.row)));
  });
  svg.querySelectorAll('.hexunit').forEach(n=>{
    n.addEventListener('click',(e)=>{ e.stopPropagation(); onUnitClick(n.dataset.uid); });
  });
  const wIcon = B.weatherObj && B.weatherObj.icon ? ' · '+B.weatherObj.icon+B.weather : (B.weather&&B.weather!=='맑음'?' · '+B.weather:'');
  document.getElementById('bturn').textContent=`${B.turn}턴 · ${B.phase===B.playerSide?'아군':'적군'}${wIcon}`;
}
function hexPoints(cx,cy,r){
  let p=[];
  for(let i=0;i<6;i++){ const a=Math.PI/180*(60*i); p.push((cx+r*Math.cos(a)).toFixed(1)+','+(cy+r*Math.sin(a)).toFixed(1)); }
  return p.join(' ');
}
function unitAt(col,row){ return B.units.find(u=>u.col===col&&u.row===row&&u.troops>0); }
function hexAt(col,row){ return B.hexes.find(h=>h.col===col&&h.row===row); }

function canMoveTo(u, hx){
  if(!isPlayerUnit(u)||u.moved) return false;
  if(unitAt(hx.col,hx.row)) return false;
  const d=hexDist({col:u.col,row:u.row},hx);
  return d>=1 && d<=unitTT(u).move; // 병과별 이동력 (기3/보2/궁2)
}
function canAttackTo(u, hx){
  if(!isPlayerUnit(u)||u.acted) return false;
  const tgt=unitAt(hx.col,hx.row);
  if(!tgt||tgt.side!==enemySide()) return false;
  return hexDist({col:u.col,row:u.row},hx)<=unitTT(u).range; // 궁병은 2칸 사거리
}

function onUnitClick(uid){
  if(BVIEW.dragged) return; // 지도 드래그 중엔 무시
  const u=B.units.find(x=>x.id===uid);
  if(!u||u.troops<=0) return;
  if(isPlayerUnit(u) && B.phase===B.playerSide){
    if(u.acted){ binfo(`${u.name} 부대는 이미 행동했습니다.`); return; }
    if(u.status && u.status.confuse){ binfo(`💫 ${u.name} 부대는 혼란에 빠져 명령을 따르지 못합니다! (${u.status.confuse}턴 남음)`); return; }
    B.sel=u; sfx('select'); haptic(15); renderBattle();
    const tt=unitTT(u);
    const aptTxt=u.gen?` (${tt.name}적성 ${aptLabel(u.gen,tt.key)})`:'';
    const dtgt=duelTargetFor(u);
    const duelHint = dtgt ? `<br><span style="color:#f88">⚔️ ${dtgt.name}에게 일기토 가능! (아래 버튼)</span>` : '';
    // 사거리 내 공격 가능한 적 + 예상 피해
    const foes=enemyUnits().filter(e=>hexDist(u,e)<=tt.range && !u.acted);
    let atkHint='';
    if(foes.length && !u.acted){
      const previews=foes.slice(0,3).map(e=>{ const c=calcAttack(u,e); return `${e.name} <b style="color:#ffd234">${c.dmgMin}~${c.dmgMax}</b>`; });
      atkHint=`<br><span style="color:#fb8">예상 피해 — ${previews.join(' / ')}</span>`;
    }
    binfo(`<b style="color:#d4af37">${u.name}</b> ${tt.icon}${tt.name}${aptTxt} · 병력 ${u.troops} · 사기 ${u.morale}<br>이동력 ${tt.move}·사거리 ${tt.range} | 노란칸=이동, 빨간칸=공격${atkHint}${duelHint}`);
    renderBattleCmd();
  } else {
    if(B.sel && canAttackTo(B.sel,{col:u.col,row:u.row})){
      showAttackPreview(B.sel, u);
    } else {
      const tt=unitTT(u);
      binfo(`[적] ${u.name} ${tt.icon}${tt.name} · 병력 ${u.troops} · 사기 ${u.morale}`);
    }
  }
}
// 공격 전 예상 피해 미리보기
function showAttackPreview(atkU, defU){
  const c=calcAttack(atkU, defU);
  const atkTT=c.atkTT, defTT=c.defTT;
  const dmgRange = c.dmgMin===c.dmgMax ? `${c.dmgMin}` : `${c.dmgMin}~${c.dmgMax}`;
  const willRout = c.dmgMax>=defU.troops;
  const counterTxt = c.isRanged ? `<span style="color:#8fa">원거리 — 반격 없음</span>`
    : (c.cExp>0 ? `예상 반격 <b style="color:#f99">${c.cMin}~${c.cMax}</b>` : '반격 없음');
  let tags='';
  if(c.counterMul>1.05) tags+=`<span style="color:#8fd">병과우세 </span>`;
  else if(c.counterMul<0.95) tags+=`<span style="color:#f99">병과열세 </span>`;
  if(c.atkInspired>1) tags+=`<span style="color:#ffd234">분전 </span>`;
  if(c.defTaunted<1) tags+=`<span style="color:#8fa">유인 </span>`;
  const body=`<div style="line-height:1.7">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px">
      <div style="text-align:center"><b style="color:#6fd3ff">${atkU.name}</b><br><span style="font-size:11px;color:#999">${atkTT.icon}${atkTT.name} · 병력 ${atkU.troops}</span></div>
      <span style="color:#d4af37;font-size:20px">⚔</span>
      <div style="text-align:center"><b style="color:#ff8a6e">${defU.name}</b><br><span style="font-size:11px;color:#999">${defTT.icon}${defTT.name} · 병력 ${defU.troops}</span></div>
    </div>
    ${tags?`<div style="text-align:center;font-size:12px;margin-bottom:6px">${tags}</div>`:''}
    <div style="background:#2a2418;border-radius:6px;padding:8px;text-align:center">
      예상 피해 <b style="color:#ffd234;font-size:18px">${dmgRange}</b>
      ${willRout?`<br><span style="color:#ff6a6a;font-weight:bold">☠️ 적 궤멸 가능!</span>`:''}
      <br><span style="font-size:12px">${counterTxt}</span>
    </div>
    <div style="font-size:11px;color:#888;margin-top:6px;text-align:center">실제 피해는 지형·사기·변수로 달라질 수 있습니다.</div>
  </div>`;
  showModal('공격 예상', body, [
    {label:'취소',cls:'',fn:closeModal},
    {label:'⚔️ 공격!',cls:'primary',fn:()=>{ closeModal(); maybeDuelThenAttack(atkU, defU); }}
  ]);
}
function onHexClick(col,row){
  if(BVIEW.dragged) return;
  const hx=hexAt(col,row); if(!hx) return;
  const tgt=unitAt(col,row);
  if(tgt){ onUnitClick(tgt.id); return; }
  if(B.sel && canMoveTo(B.sel,hx)){
    B.sel.col=col; B.sel.row=row; B.sel.moved=true;
    sfx('move'); haptic(20);
    renderBattle();
    binfo(`${B.sel.name} 이동 완료. 인접 적을 공격하거나 대기하세요.`);
    renderBattleCmd();
  }
}

function renderBattleCmd(){
  const cmd=document.getElementById('bcmd'); cmd.innerHTML='';
  if(B.sel && B.phase===B.playerSide){
    // 일기토 버튼 (인접 적 무장이 있고 조건 충족 시)
    const dtgt=duelTargetFor(B.sel);
    if(dtgt){
      const duel=document.createElement('button'); duel.className='btn duel-btn'; duel.textContent='⚔️ 일기토';
      duel.onclick=manualDuel;
      cmd.appendChild(duel);
    }
    // 계략 버튼 (지력 충분 + 사거리 내 적)
    if(canUseStrat(B.sel)){
      const strat=document.createElement('button'); strat.className='btn strat-btn'; strat.textContent='🎋 계략';
      strat.onclick=openStratMenu;
      cmd.appendChild(strat);
    }
    const wait=document.createElement('button'); wait.className='btn'; wait.textContent='대기(행동종료)';
    wait.onclick=()=>{ B.sel.acted=true; B.sel.moved=true; B.sel=null; renderBattle(); checkPhaseEnd(); renderBattleCmd(); binfo('부대를 선택하세요.'); };
    cmd.appendChild(wait);
  }
  const end=document.createElement('button'); end.className='btn primary'; end.textContent='아군 턴 종료';
  end.onclick=endPlayerPhase; cmd.appendChild(end);
  if(B.playerSide==='atk'){
    const retreat=document.createElement('button'); retreat.className='btn'; retreat.textContent='철수';
    retreat.onclick=()=>{ showModal('철수','전투에서 철수하시겠습니까? 공격이 무효화됩니다.',
      [{label:'취소',cls:'',fn:closeModal},{label:'철수',cls:'primary',fn:()=>{closeModal();endBattle('retreat');}}]); };
    cmd.appendChild(retreat);
  }
}

// 일기토 조건 확인 후 실행 → 이후 일반 공격
// 일기토 가능 여부 (양쪽 무장 + 무력 65+ + 인접 + 미실행)
function canDuelUnits(atkU, defU){
  return atkU && defU && atkU.gen && defU.gen
    && atkU.war>=65 && defU.war>=65
    && hexDist(atkU,defU)===1 && !B.duelDone;
}
// 현재 선택 부대가 일기토 걸 수 있는 인접 적 (있으면 반환)
function duelTargetFor(u){
  if(!u || !u.gen || u.acted || u.war<65 || B.duelDone) return null;
  const foes=enemyUnits().filter(e=>e.gen && e.war>=65 && hexDist(u,e)===1);
  return foes.length? foes[0] : null;
}
// 일기토 제안 모달 (자동/수동 공용)
function promptDuel(atkU, defU){
  const rel = relationBetween(atkU.name, defU.name);
  let relLine='';
  if(rel){
    if(rel.type==='foe') relLine=`<div style="color:#f66;font-size:13px;margin-bottom:6px">⚔ 숙적! 서로 물러설 수 없다 (투지 상승)</div>`;
    else if(rel.type==='rival') relLine=`<div style="color:#fc6;font-size:13px;margin-bottom:6px">🔥 숙명의 라이벌</div>`;
    else if(rel.type==='sworn'||rel.type==='lord') relLine=`<div style="color:#8fd;font-size:13px;margin-bottom:6px">${REL_LABEL[rel.type]} 관계… 창을 겨누는가</div>`;
  }
  const cry = genLine(atkU.gen,'duel');
  showModal('⚔️ 일기토!',
    `<div style="text-align:center">
      ${relLine}
      <div style="display:flex;justify-content:center;gap:10px;align-items:center;margin-bottom:8px">
        <div>${genPortraitSVG(atkU.gen,72)}<div style="color:${personaColor(atkU.gen)};font-weight:bold">${atkU.name}</div><div style="font-size:11px;color:#999">무력 ${atkU.war}</div></div>
        <span style="color:#d4af37;font-size:22px">⚔</span>
        <div>${genPortraitSVG(defU.gen,72)}<div style="color:${personaColor(defU.gen)};font-weight:bold">${defU.name}</div><div style="font-size:11px;color:#999">무력 ${defU.war}</div></div>
      </div>
      <div style="color:#dca;font-style:italic;margin:8px 0">"${cry}"</div>
      일기토를 걸어 도전하시겠습니까?<br>
      <span style="font-size:12px;color:#999">승리 시 적에 큰 타격, 패배 시 아군 피해.</span>
    </div>`,
    [{label:'일반 공격',cls:'',fn:()=>{ closeModal(); doAttack(atkU,defU); }},
     {label:'⚔️ 도전!',cls:'primary',fn:()=>{ closeModal(); doDuel(atkU,defU); }}]);
}
// 수동 일기토 (버튼): 인접 적이 여럿이면 선택
function manualDuel(){
  const u=B.sel;
  if(!u){ binfo('먼저 아군 무장 부대를 선택하세요.'); return; }
  if(u.acted){ binfo('이미 행동한 부대입니다.'); return; }
  if(B.duelDone){ binfo('이 전투에서는 이미 일기토가 벌어졌습니다.'); return; }
  if(!u.gen || u.war<65){ binfo('이 부대의 장수는 일기토를 걸 수 없습니다 (무력 65 이상 필요).'); return; }
  const foes=enemyUnits().filter(e=>e.gen && e.war>=65 && hexDist(u,e)===1);
  if(!foes.length){ binfo('인접한 적 무장(무력 65+)이 없습니다. 옆에 붙어야 일기토가 가능합니다.'); return; }
  if(foes.length===1){ promptDuel(u, foes[0]); return; }
  // 여러 명이면 선택
  let body=`<p style="margin-bottom:8px;color:#b8a878">일기토 상대를 선택하세요.</p>`;
  foes.forEach(f=>{
    body+=`<div class="listitem" onclick="closeModal(); promptDuel(B.sel, B.units.find(x=>x.id===${f.id}))">
      <b style="color:${personaColor(f.gen)}">${f.name}</b>
      <span style="margin-left:auto;color:#b8a878">무력 ${f.war} · ${personaLabel(f.gen)}</span></div>`;
  });
  showModal('일기토 상대', body, [{label:'취소',cls:'',fn:closeModal}]);
}

function maybeDuelThenAttack(atkU, defU){
  // 자동 제안: 조건 충족 시 확률적으로 일기토 창
  if(canDuelUnits(atkU,defU) && Math.random()<0.5){ // 확률 35%→50%
    promptDuel(atkU, defU);
  } else {
    doAttack(atkU,defU);
  }
}

function doDuel(atkU, defU){
  sfx('duel'); hapticPattern([40,60,40,60,80]);
  // 숙적/라이벌 관계 → 호걸은 투지, 판정 보정
  const rel = relationBetween(atkU.name, defU.name);
  let aBonus=1.0, dBonus=1.0;
  if(rel && (rel.type==='foe'||rel.type==='rival')){
    if(personaOf(atkU.gen)==='brave') aBonus=1.12; // 호걸은 숙적전에서 분발
    if(personaOf(defU.gen)==='brave') dBonus=1.12;
  }
  // 무력 + 사기 + 무작위. 라운드 3회 판정
  let aScore=0, dScore=0, rounds=[], roundWin=[];
  for(let i=0;i<3;i++){
    const a=atkU.war*aBonus*(0.7+atkU.morale/300)+Math.random()*40;
    const d=defU.war*dBonus*(0.7+defU.morale/300)+Math.random()*40;
    if(a>=d){ aScore++; rounds.push(`${i+1}합: ${atkU.name} 우세`); roundWin.push('a'); }
    else { dScore++; rounds.push(`${i+1}합: ${defU.name} 우세`); roundWin.push('d'); }
  }
  const win = aScore>dScore;
  B.duelDone=true;
  // 애니메이션 재생 후 결과 처리
  playDuelAnimation(atkU, defU, roundWin, win, rel, ()=>{
    let result='';
    if(win){
      const loss=Math.min(defU.troops, Math.floor(defU.troops*0.25+300));
      defU.troops-=loss; defU.morale=Math.max(0,defU.morale-35);
      atkU.morale=Math.min(120,atkU.morale+10);
      const cry=genLine(atkU.gen,'win');
      result=`<span style="color:#8fd">${atkU.name} 승리!</span> 적 병력 -${loss}<br><span style="color:#dca;font-style:italic">"${cry}"</span>`;
      shake('xl'); sfx('crit'); haptic(140); impactFlash('big'); hitStop(); slashFx(defU.col,defU.row); shockwave(defU.col,defU.row); vignette('gold'); bigBanner('一騎討 勝!','#ffd234'); popDamage(defU.col,defU.row,'一騎討 勝!','crit'); hitFlash(defU.col,defU.row); spawnParticles(defU.col,defU.row,20,'#d44');
    } else {
      const loss=Math.min(atkU.troops, Math.floor(atkU.troops*0.18+200));
      atkU.troops-=loss; atkU.morale=Math.max(0,atkU.morale-25);
      defU.morale=Math.min(120,defU.morale+10);
      const cry=genLine(defU.gen,'win');
      result=`<span style="color:#f99">${defU.name} 승리...</span> 아군 병력 -${loss}<br><span style="color:#dca;font-style:italic">"${cry}"</span>`;
      shake('xl'); sfx('crit'); haptic(160); impactFlash('red'); hitStop(); slashFx(atkU.col,atkU.row); shockwave(atkU.col,atkU.row,'red'); vignette(); bigBanner('一騎討 敗','#ff5a5a'); popDamage(atkU.col,atkU.row,'一騎討 敗','counter'); hitFlash(atkU.col,atkU.row); spawnParticles(atkU.col,atkU.row,20,'#4a8ad4');
    }
    renderBattle();
    showModal('⚔️ 일기토 결과',
      `<div style="line-height:1.8">${rounds.join('<br>')}<br><br><b>${result}</b></div>`,
      [{label:'이어서 교전',cls:'primary',fn:()=>{ closeModal();
          if(atkU.troops>0 && defU.troops>0){ doAttack(atkU,defU); }
          else { atkU.acted=true; atkU.moved=true; B.sel=null; renderBattle(); checkBattleEnd(); checkPhaseEnd(); renderBattleCmd(); }
       }}]);
  });
}

/* ---------- 일기토 애니메이션 ---------- */
function playDuelAnimation(atkU, defU, roundWin, finalWin, rel, done){
  const ov=document.getElementById('duelStage');
  const aColor=personaColor(atkU.gen), dColor=personaColor(defU.gen);
  const relTag = rel ? `<div class="duel-rel">${rel.type==='foe'?'⚔ 숙적':rel.type==='rival'?'🔥 라이벌':REL_LABEL[rel.type]}</div>` : '';
  ov.innerHTML = `
    <div class="duel-vs-label">一騎討</div>
    ${relTag}
    <div class="duel-arena">
      <div class="duel-fighter fL" id="duelL">
        ${genPortraitSVG(atkU.gen,110)}
        <div class="duel-name" style="color:${aColor}">${atkU.name}</div>
        <div class="duel-hp" id="duelHpL"><i></i></div>
      </div>
      <div class="duel-clash" id="duelClash">⚔</div>
      <div class="duel-fighter fR" id="duelR">
        ${genPortraitSVG(defU.gen,110)}
        <div class="duel-name" style="color:${dColor}">${defU.name}</div>
        <div class="duel-hp" id="duelHpR"><i></i></div>
      </div>
    </div>
    <div class="duel-round" id="duelRound"></div>
    <div class="duel-skip" onclick="window.__duelSkip&&window.__duelSkip()">탭하여 건너뛰기 ▶</div>
  `;
  ov.classList.add('show');
  const L=ov.querySelector('#duelL'), R=ov.querySelector('#duelR');
  const clash=ov.querySelector('#duelClash'), roundEl=ov.querySelector('#duelRound');
  const hpL=ov.querySelector('#duelHpL i'), hpR=ov.querySelector('#duelHpR i');
  let aHP=100, dHP=100;
  let i=0, cancelled=false;
  const timers=[];
  function cleanup(){ timers.forEach(clearTimeout); ov.classList.remove('show'); ov.innerHTML=''; window.__duelSkip=null; }
  window.__duelSkip=()=>{ if(cancelled) return; cancelled=true; cleanup(); done&&done(); };
  function clashStep(){
    if(cancelled) return;
    if(i>=roundWin.length){
      // 결착 포즈
      roundEl.textContent = finalWin? `${atkU.name} 승!` : `${defU.name} 승!`;
      const winnerEl = finalWin? L : R, loserEl = finalWin? R : L;
      winnerEl.classList.add('victor'); loserEl.classList.add('defeated');
      sfx(finalWin?'win':'lose');
      timers.push(setTimeout(()=>{ if(!cancelled){ cleanup(); done&&done(); } }, 900));
      return;
    }
    const w=roundWin[i];
    // 돌진
    L.classList.add('lunge'); R.classList.add('lunge');
    timers.push(setTimeout(()=>{
      if(cancelled) return;
      // 충돌
      clash.classList.add('boom'); sfx('crit'); shake('m'); haptic(60);
      if(w==='a'){ dHP=Math.max(0,dHP-34); hpR.style.width=dHP+'%'; R.classList.add('hurt'); }
      else { aHP=Math.max(0,aHP-34); hpL.style.width=aHP+'%'; L.classList.add('hurt'); }
      roundEl.textContent = `${i+1}합 — ${w==='a'?atkU.name:defU.name} 우세!`;
      roundEl.style.color = w==='a'?personaColor(atkU.gen):personaColor(defU.gen);
      timers.push(setTimeout(()=>{
        if(cancelled) return;
        L.classList.remove('lunge','hurt'); R.classList.remove('lunge','hurt'); clash.classList.remove('boom');
        i++; clashStep();
      }, 520));
    }, 420));
  }
  timers.push(setTimeout(clashStep, 650)); // 등장 후 시작
}

/* ============================================================
   대역전 시스템: 계략 · 사기붕괴 · 천기 · 영웅각성
   ============================================================ */
const STRATAGEMS = {
  fire:    { name:'화계', icon:'🔥', minInt:75, range:3, desc:'화공으로 광역 피해 + 화상(지속피해). 숲에 강력.' },
  confuse: { name:'혼란', icon:'💫', minInt:70, range:3, desc:'적 부대를 혼란시켜 다음 턴 행동 봉쇄.' },
  ambush:  { name:'복병', icon:'🌿', minInt:65, range:2, desc:'매복 기습. 큰 피해 + 사기 급감.' },
  taunt:   { name:'유인', icon:'🎣', minInt:68, range:3, desc:'적을 도발해 끌어당기고 방어력 저하.' },
};
function stratSuccessRate(caster, target){
  const ci=caster.int, ti=target.gen?target.int:40;
  let base = 0.5 + (ci - ti)/120;
  if(B.weatherObj){
    if(B.weatherObj.effect==='ambush_boost') base+=0.12;
  }
  if(unitSkill(caster)==='tactician') base+=0.20; // 지략 특기
  return Math.max(0.15, Math.min(0.95, base));
}
function canUseStrat(u){
  if(!u || !u.gen || u.acted || u.stratUsed || B.phase!==B.playerSide) return null;
  const avail = Object.entries(STRATAGEMS).filter(([k,s])=> u.int>=s.minInt);
  if(!avail.length) return null;
  const maxRange = Math.max(...avail.map(([k,s])=>s.range));
  const foes = enemyUnits().filter(e=> hexDist(u,e)<=maxRange);
  return foes.length? avail.map(([k])=>k) : null;
}
function openStratMenu(){
  const u=B.sel;
  if(!u){ binfo('먼저 아군 무장 부대를 선택하세요.'); return; }
  if(u.stratUsed){ binfo(`${u.name}은(는) 이미 계략을 썼습니다.`); return; }
  const avail = Object.entries(STRATAGEMS).filter(([k,s])=> u.int>=s.minInt);
  if(!avail.length){ binfo(`${u.name}의 지력(${u.int})으로는 쓸 계략이 없습니다.`); return; }
  let body=`<div style="font-size:12px;color:#b8a878;margin-bottom:8px">${u.name} (지력 ${u.int}) — 계략 선택 · 천기: ${B.weatherObj?B.weatherObj.icon+B.weather:'맑음'}</div>`;
  avail.forEach(([k,s])=>{
    const foes=enemyUnits().filter(e=>hexDist(u,e)<=s.range);
    const usable=foes.length>0;
    let note=usable?foes.length+'대상':'사거리 밖';
    if(k==='fire' && B.weatherObj){ if(B.weatherObj.effect==='fire_boost') note+=' 💨강풍!'; if(B.weatherObj.effect==='fire_block') { note='폭우로 봉쇄'; }}
    const blocked = (k==='fire' && B.weatherObj && B.weatherObj.effect==='fire_block');
    body+=`<div class="listitem" style="${usable&&!blocked?'':'opacity:.4;pointer-events:none'}" onclick="closeModal(); pickStratTarget('${k}')">
      <span style="font-size:18px">${s.icon}</span>
      <div><b style="color:#d4af37">${s.name}</b> <span style="font-size:11px;color:#999">(사거리 ${s.range})</span><br>
      <span style="font-size:11px;color:#b8a878">${s.desc}</span></div>
      <span style="margin-left:auto;font-size:11px;color:${usable&&!blocked?'#8fd':'#f88'}">${note}</span></div>`;
  });
  showModal('🎋 계략', body, [{label:'취소',cls:'',fn:closeModal}]);
}
function pickStratTarget(key){
  const u=B.sel, s=STRATAGEMS[key];
  const foes=enemyUnits().filter(e=>hexDist(u,e)<=s.range);
  if(!foes.length){ binfo('사거리 내 적이 없습니다.'); return; }
  if(foes.length===1){ execStrat(key, u, foes[0]); return; }
  let body=`<p style="margin-bottom:8px;color:#b8a878">${s.icon} ${s.name} 대상 선택</p>`;
  foes.forEach(f=>{
    const rate=Math.round(stratSuccessRate(u,f)*100);
    body+=`<div class="listitem" onclick="closeModal(); execStrat('${key}', B.sel, B.units.find(x=>x.id==='${f.id}'))">
      <b style="color:${f.gen?personaColor(f.gen):'#aaa'}">${f.name}</b>
      <span style="margin-left:auto;color:#b8a878">성공률 ${rate}% · 지력 ${f.gen?f.int:40}</span></div>`;
  });
  showModal('계략 대상', body, [{label:'취소',cls:'',fn:closeModal}]);
}
function execStrat(key, caster, target){
  const s=STRATAGEMS[key];
  caster.stratUsed=true; caster.acted=true; caster.moved=true;
  const rate=stratSuccessRate(caster,target);
  const success=Math.random()<rate;
  sfx(success?'crit':'select'); focusLinesFx();
  const cx=target.col, cy=target.row;
  if(!success){
    binfo(`<b>${caster.name}</b>의 ${s.icon}${s.name} 실패! <span style="color:#f88">${target.name}이(가) 간파했다.</span>`);
    popDamage(cx,cy,'간파!','counter'); haptic(40);
    B.sel=null; renderBattle(); renderBattleCmd(); checkPhaseEnd();
    return;
  }
  let msg=`<b style="color:#8fd">${caster.name}</b>의 ${s.icon}${s.name} 성공!`;
  if(key==='fire'){
    const terr=hexAt(target.col,target.row).terr;
    let terrMul = terr==='forest'?1.6 : terr==='plain'?1.2 : 1.0;
    if(B.weatherObj && B.weatherObj.effect==='fire_boost') terrMul*=1.5; // 강풍
    const dmg=Math.floor(target.troops*(0.25+caster.int/400)*terrMul);
    target.troops=Math.max(0,target.troops-dmg);
    target.status.burn=2; target.morale=Math.max(0,target.morale-25);
    enemyUnits().filter(e=>e!==target && hexDist(e,target)===1).forEach(e=>{
      const d2=Math.floor(e.troops*0.12); e.troops=Math.max(0,e.troops-d2); e.status.burn=1;
      spawnParticles(e.col,e.row,8,'#f80');
    });
    impactFlash('big'); shake('xl'); hitStop(); haptic(140); vignette('gold'); shockwave(cx,cy);
    bigBanner('🔥 火計!', '#ff8020');
    for(let i=0;i<28;i++) setTimeout(()=>spawnParticles(cx,cy,3,['#f80','#fc0','#f40'][i%3]),i*28);
    msg+=`<br>${target.name} 화염 -${dmg}${terr==='forest'?' <span style="color:#f80">[숲: 대폭발!]</span>':''}${B.weatherObj&&B.weatherObj.effect==='fire_boost'?' <span style="color:#8cf">[강풍!]</span>':''}`;
  } else if(key==='confuse'){
    target.status.confuse=2; target.morale=Math.max(0,target.morale-15);
    for(let i=0;i<12;i++) setTimeout(()=>spawnParticles(cx,cy,2,'#c0f'),i*40);
    shake('m'); haptic(70);
    msg+=`<br>${target.name} 혼란! 2턴간 행동 불가`;
  } else if(key==='ambush'){
    let mul=0.3+caster.int/350;
    if(B.weatherObj && B.weatherObj.effect==='ambush_boost') mul*=1.4;
    const dmg=Math.floor(target.troops*mul);
    target.troops=Math.max(0,target.troops-dmg); target.morale=Math.max(0,target.morale-35);
    slashFx(cx,cy); impactFlash('big'); shake('xl'); hitStop(); haptic(130); shockwave(cx,cy); vignette('gold'); bigBanner('🌿 伏兵!', '#5fc860'); spawnParticles(cx,cy,22,'#3a2');
    msg+=`<br>${target.name} 매복 기습 -${dmg}, 사기 급감!`;
  } else if(key==='taunt'){
    target.status.taunted=2;
    const nb=hexNeighbors(target.col,target.row).filter(n=>!unitAt(n.col,n.row));
    if(nb.length){ nb.sort((a,b)=>hexDist(a,caster)-hexDist(b,caster)); target.col=nb[0].col; target.row=nb[0].row; }
    target.morale=Math.max(0,target.morale-10);
    msg+=`<br>${target.name}을(를) 유인 (방어력 저하)`;
  }
  binfo(msg);
  if(target.troops<=0){ setTimeout(()=>{ sfx('destroy'); impactFlash('red'); popDamage(target.col,target.row,'궤멸!','crit'); }, 200); }
  B.sel=null; renderBattle(); renderBattleCmd();
  checkMoraleCollapse(enemySide());
  checkBattleEnd(); checkPhaseEnd();
}

// 사기 붕괴
function checkMoraleCollapse(side){
  const units=B.units.filter(u=>u.side===side);
  const alive=units.filter(u=>u.troops>0);
  if(!alive.length) return;
  const destroyed=units.filter(u=>u.troops<=0).length;
  const total=units.length;
  const avgMorale=alive.reduce((s,u)=>s+u.morale,0)/alive.length;
  if(!B.collapsed) B.collapsed={};
  if((destroyed>=Math.ceil(total/2) || avgMorale<30) && !B.collapsed[side]){
    B.collapsed[side]=true;
    alive.forEach(u=>{ u.morale=Math.max(0,u.morale-40); u.troops=Math.floor(u.troops*0.7); });
    const isEnemy = side===enemySide();
    binfo(`<b style="color:${isEnemy?'#8fd':'#f88'}">⚡ ${isEnemy?'적군':'아군'} 총붕괴! 사기가 무너져 이탈이 속출한다!</b>`);
    sfx(isEnemy?'win':'lose'); shake('xl'); hitStop(); haptic(220); impactFlash(isEnemy?'big':'red');
    vignette(isEnemy?'gold':null); bigBanner(isEnemy?'적군 총붕괴!':'아군 총붕괴!', isEnemy?'#ffd234':'#ff5a5a');
    alive.forEach(u=>spawnParticles(u.col,u.row,12, isEnemy?'#d44':'#4a8ad4'));
    log(`${isEnemy?'적군':'아군'} 사기 총붕괴!`, true);
  }
}

// 천기(날씨)
const WEATHERS=[
  {name:'맑음', icon:'☀️', weight:50, effect:null},
  {name:'강풍', icon:'💨', weight:15, effect:'fire_boost', desc:'화계 위력 대폭 상승!'},
  {name:'안개', icon:'🌫️', weight:12, effect:'ambush_boost', desc:'복병·기습 성공률 상승'},
  {name:'폭우', icon:'🌧️', weight:12, effect:'fire_block', desc:'화계 봉쇄'},
  {name:'역병', icon:'☠️', weight:6, effect:'plague', desc:'양측 병력 서서히 감소'},
];
function rollWeather(){
  const total=WEATHERS.reduce((s,w)=>s+w.weight,0);
  let r=Math.random()*total;
  for(const w of WEATHERS){ if((r-=w.weight)<0) return w; }
  return WEATHERS[0];
}
function applyWeatherStart(){
  const w=rollWeather();
  B.weather=w.name; B.weatherObj=w;
  if(w.effect){
    // 모달 대신 배너로 표시(계략/일기토 모달과 충돌 방지)
    setTimeout(()=>{ if(B.active){ bigBanner(`${w.icon} ${w.name}`, '#8cf'); binfo(`<b style="color:#8cf">${w.icon} 천기: ${w.name}</b> — ${w.desc||''}`); } }, 500);
    log(`전장에 ${w.name}! ${w.desc||''}`, true);
  }
}

// 영웅 각성
function checkHeroicRally(u){
  if(!u.gen || u.rallied || u.troops<=0) return false;
  const lowTroops = u.troops < u.maxTroops*0.35;
  const surrounded = enemyUnits().filter(e=>hexDist(u,e)<=1).length>=2;
  const brave = personaOf(u.gen)==='brave' || u.war>=88;
  if(lowTroops && (surrounded||brave) && Math.random()<0.4){
    u.rallied=true; u.status.inspired=3; u.morale=Math.min(150,u.morale+60);
    binfo(`<b style="color:#ffd234">🔥 ${u.name} 분전(奮戰)! 위기에서 각성하여 무위를 떨친다!</b>`);
    const cry=genLine(u.gen,'battle');
    setTimeout(()=>binfo(`<span style="color:#dca;font-style:italic">${u.name}: "${cry}"</span>`), 400);
    sfx('crit'); focusLinesFx(); impactFlash('big'); shake('l'); hitStop(); haptic(160);
    vignette('gold'); bigBanner('🔥 奮戰!', '#ffd234');
    spawnParticles(u.col,u.row,24,'#ffd234'); shockwave(u.col,u.row);
    log(`${u.name} 분전 각성!`, true); renderBattle();
    return true;
  }
  return false;
}
// 상태이상 턴 처리
function tickStatuses(side){
  B.units.filter(u=>u.side===side && u.troops>0).forEach(u=>{
    if(u.status.burn){
      const d=Math.floor(u.maxTroops*0.06); u.troops=Math.max(0,u.troops-d);
      popDamage(u.col,u.row,'-'+d,'crit'); spawnParticles(u.col,u.row,4,'#f80');
      u.status.burn--; if(u.status.burn<=0) delete u.status.burn;
    }
    if(u.status.confuse){ u.status.confuse--; if(u.status.confuse<=0) delete u.status.confuse; }
    if(u.status.taunted){ u.status.taunted--; if(u.status.taunted<=0) delete u.status.taunted; }
    if(u.status.inspired){ u.status.inspired--; if(u.status.inspired<=0) delete u.status.inspired; }
  });
  if(B.weatherObj && B.weatherObj.effect==='plague'){
    B.units.filter(u=>u.troops>0).forEach(u=>{ const d=Math.floor(u.maxTroops*0.03); u.troops=Math.max(0,u.troops-d); });
  }
}

// 데미지 계산(미리보기·실행 공용). 실제 troops 변경 없음.
function unitSkill(u){ return u.gen && u.gen.skill ? u.gen.skill : 'none'; }
function calcAttack(atkU, defU){
  const dhex=hexAt(defU.col,defU.row);
  const defBonus=terrainDefBonus(dhex.terr);
  const atkTT=unitTT(atkU), defTT=unitTT(defU);
  const counterMul=counterBonus(atkTT.key, defTT.key);
  const atkApt=aptMul(atkU.gen, atkTT.key);
  const defApt=aptMul(defU.gen, defTT.key);
  const isRanged = hexDist(atkU,defU)>1;
  const atkInspired = atkU.status && atkU.status.inspired ? 1.4 : 1.0;
  const defTaunted = defU.status && defU.status.taunted ? 0.75 : 1.0;
  // 특기: 맹장(공격+15%), 기병/궁술(해당 병과 강화)
  let skillMul=1.0;
  const as=unitSkill(atkU);
  if(as==='valor') skillMul*=1.15;
  if(as==='cavalry' && atkTT.key==='cav') skillMul*=1.2;
  if(as==='archer' && atkTT.key==='arc') skillMul*=1.2;
  // 방어측 철벽
  let defSkillMul=1.0;
  if(unitSkill(defU)==='defense') defSkillMul*=1.15;
  const atkPower = atkU.troops*(0.35+atkU.war/300)*(0.6+atkU.train/250)*(0.5+atkU.morale/200)
    *atkTT.atkMul*counterMul*atkApt*atkInspired*skillMul;
  const defPower = defU.troops*(0.20+defU.war/400)*(1+defBonus)*defTT.def*defApt*defTaunted*defSkillMul;
  // 랜덤 요소(±100)를 제외한 기대값 + 범위
  const base = atkPower - defPower*0.5;
  const expected = Math.max(50, Math.floor(base));
  const dmgMin = Math.max(50, Math.floor(base-100));
  const dmgMax = Math.max(50, Math.floor(base+100));
  // 예상 반격
  let cMin=0,cMax=0,cExp=0;
  if(!isRanged){
    const dCounterMul=counterBonus(defTT.key, atkTT.key);
    const cbase = defU.troops*(0.15+defU.war/400)*(0.5+defU.morale/200)*defTT.atkMul*dCounterMul*defApt;
    cExp=Math.max(20,Math.floor(cbase)); cMin=Math.max(20,Math.floor(cbase-50)); cMax=Math.max(20,Math.floor(cbase+50));
  }
  return {counterMul,atkApt,defApt,isRanged,atkInspired,defTaunted,atkTT,defTT,
    expected, dmgMin:Math.min(dmgMin,defU.troops), dmgMax:Math.min(dmgMax,defU.troops),
    cExp, cMin, cMax};
}

function doAttack(atkU, defU){
  // 먼저 교전 연출(두 부대 번갈아 빛남) 재생 후 실제 타격
  B.animating=true;
  playClash(atkU, defU, ()=>{ B.animating=false; resolveAttack(atkU, defU); });
}

function resolveAttack(atkU, defU){
  const dhex=hexAt(defU.col,defU.row);
  const defBonus=terrainDefBonus(dhex.terr);
  const atkTT=unitTT(atkU), defTT=unitTT(defU);
  const counterMul=counterBonus(atkTT.key, defTT.key); // 병과 상성
  const atkApt=aptMul(atkU.gen, atkTT.key);   // 공격측 병과 적성
  const defApt=aptMul(defU.gen, defTT.key);   // 방어측 병과 적성
  const isRanged = hexDist(atkU,defU)>1; // 궁병 원거리 공격
  // 상태이상 보정
  const atkInspired = atkU.status && atkU.status.inspired ? 1.4 : 1.0; // 각성: 공격력 대폭↑
  const defTaunted = defU.status && defU.status.taunted ? 0.75 : 1.0;  // 유인당함: 방어력↓
  // 특기 보정
  let skillMul=1.0; const as=unitSkill(atkU);
  if(as==='valor') skillMul*=1.15;
  if(as==='cavalry' && atkTT.key==='cav') skillMul*=1.2;
  if(as==='archer' && atkTT.key==='arc') skillMul*=1.2;
  const defSkillMul = unitSkill(defU)==='defense' ? 1.15 : 1.0;
  // 데미지: 병과 공격배율·상성·적성 반영
  const atkPower = atkU.troops*(0.35+atkU.war/300)*(0.6+atkU.train/250)*(0.5+atkU.morale/200)
    *atkTT.atkMul*counterMul*atkApt*atkInspired*skillMul;
  const defPower = defU.troops*(0.20+defU.war/400)*(1+defBonus)*defTT.def*defApt*defTaunted*defSkillMul;
  let dmg = Math.max(50, Math.floor(atkPower - defPower*0.5 + (Math.random()*200-100)));
  dmg = Math.min(dmg, defU.troops);
  defU.troops -= dmg;
  defU.morale = Math.max(0, defU.morale-12);
  // 반격: 원거리(궁병) 공격이면 반격 없음. 근접이면 반격
  let counter=0;
  if(defU.troops>0 && !isRanged){
    const dCounterMul=counterBonus(defTT.key, atkTT.key);
    counter = Math.max(20, Math.floor(defU.troops*(0.15+defU.war/400)*(0.5+defU.morale/200)*defTT.atkMul*dCounterMul*defApt + (Math.random()*100-50)));
    counter = Math.min(counter, atkU.troops);
    atkU.troops-=counter; atkU.morale=Math.max(0,atkU.morale-6);
  }
  atkU.acted=true; atkU.moved=true;
  // === 이펙트 (강화) ===
  const big = dmg >= defU.maxTroops*0.35 || counterMul>1.05;
  const huge = dmg >= defU.maxTroops*0.55;
  if(isRanged){ sfx('arrow'); } else { sfx(big?'crit':'hit'); slashFx(defU.col,defU.row); }
  hitFlash(defU.col, defU.row);
  popDamage(defU.col, defU.row, '-'+dmg, big?'crit':'');
  spawnParticles(defU.col, defU.row, huge?22:big?14:7, isPlayerUnit(defU)?'#4a8ad4':'#d44');
  if(huge){ shake('xl'); hitStop(); shockwave(defU.col,defU.row); impactFlash('big'); haptic(140); }
  else if(big){ shake('l'); shockwave(defU.col,defU.row); impactFlash(); haptic(90); }
  else { shake('s'); haptic(45); }
  if(counter>0){ setTimeout(()=>{ popDamage(atkU.col,atkU.row,'-'+counter,'counter'); hitFlash(atkU.col,atkU.row); spawnParticles(atkU.col,atkU.row,6,isPlayerUnit(atkU)?'#4a8ad4':'#d44'); sfx('hit'); haptic(30); }, 220); }
  const aptTag = atkU.gen ? ` <span style="color:#dca">${atkTT.name}${aptLabel(atkU.gen,atkTT.key)}</span>` : '';
  let msg=`<b>${atkU.name}</b>(${atkTT.icon}${aptTag}) → <b>${defU.name}</b>(${defTT.icon}) · 피해 ${dmg}`;
  if(atkInspired>1) msg+=` <span style="color:#ffd234">[분전!]</span>`;
  if(defTaunted<1) msg+=` <span style="color:#8fa">[유인]</span>`;
  if(counterMul>1.05) msg+=` <span style="color:#8fd">[병과우세]</span>`;
  else if(counterMul<0.95) msg+=` <span style="color:#f99">[병과열세]</span>`;
  if(isRanged) msg+=` <span style="color:#8fa">[원거리]</span>`;
  if(counter>0) msg+=`<br>반격 ${counter}`;
  if(defU.troops<=0){ msg+=`<br><span style="color:#d4af37">${defU.name} 부대 궤멸!</span>`;
    if(defU.gen){ const cry=genLine(defU.gen,'lose'); if(cry) msg+=`<br><span style="color:#c88;font-style:italic">${defU.name}: "${cry}"</span>`; }
    setTimeout(()=>{ sfx('destroy'); shake('xl'); hitStop(); haptic(180); impactFlash('red'); vignette(isPlayerUnit(defU)?null:'gold');
      shockwave(defU.col,defU.row,'red'); popDamage(defU.col,defU.row,'궤멸!','crit');
      bigBanner(defU.name+' 궤멸!', isPlayerUnit(defU)?'#ff6a6a':'#ffd234');
      spawnParticles(defU.col,defU.row,28,isPlayerUnit(defU)?'#4a8ad4':'#d44'); }, 150); }
  binfo(msg);
  B.sel=null; renderBattle(); renderBattleCmd();
  // 대역전 체크: 방어측 각성(위기 시), 양측 사기붕괴
  if(defU.troops>0) checkHeroicRally(defU);
  if(atkU.troops>0 && atkU.troops<atkU.maxTroops*0.35) checkHeroicRally(atkU);
  checkMoraleCollapse(defU.side);
  checkBattleEnd();
  checkPhaseEnd();
}

function checkPhaseEnd(){
  const alive=playerUnits();
  if(alive.length && alive.every(u=>u.acted)){
    // 모든 아군 행동 완료 → 자동으로 적 페이즈 안내(수동 종료도 가능)
  }
}
function endPlayerPhase(){
  B.phase=enemySide(); B.sel=null; renderBattle(); binfo('적군 페이즈...');
  setTimeout(enemyPhase, 500);
}
function enemyPhase(){
  const foes=enemyUnits();
  let i=0;
  function step(){
    if(i>=foes.length){ endEnemyPhase(); return; }
    const u=foes[i++];
    if(u.troops<=0){ step(); return; }
    // 혼란 상태면 행동 스킵
    if(u.status && u.status.confuse){ popDamage(u.col,u.row,'혼란','counter'); setTimeout(step,300); return; }
    // AI: 가장 가까운 플레이어 부대로 이동 후 공격
    const targets=playerUnits();
    if(!targets.length){ endEnemyPhase(); return; }
    let target=targets.reduce((a,b)=> hexDist(u,a)<=hexDist(u,b)?a:b);
    // AI 계략: 지력 높은 적이 확률적으로 화계/복병
    if(u.gen && u.int>=75 && !u.stratUsed && Math.random()<0.3){
      const foesInRange=playerUnits().filter(e=>hexDist(u,e)<=3);
      if(foesInRange.length){
        const tgt=foesInRange[0]; u.stratUsed=true;
        const key = u.int>=B.weatherObj && B.weatherObj && B.weatherObj.effect==='fire_boost' ? 'fire' : (Math.random()<0.5?'ambush':'fire');
        setTimeout(()=>{ enemyStrat(key,u,tgt); setTimeout(step,500); }, 300);
        return;
      }
    }
    // 이동 (이동력만큼)
    const mv=unitTT(u).move;
    if(hexDist(u,target)>unitTT(u).range){
      for(let s=0;s<mv;s++){
        if(hexDist(u,target)<=unitTT(u).range) break;
        const nbrs=hexNeighbors(u.col,u.row).filter(n=>!unitAt(n.col,n.row));
        if(!nbrs.length) break;
        nbrs.sort((a,b)=>hexDist(a,target)-hexDist(b,target));
        u.col=nbrs[0].col; u.row=nbrs[0].row;
      }
    }
    renderBattle();
    // 공격
    if(hexDist(u,target)<=unitTT(u).range){
      setTimeout(()=>{ enemyAttack(u,target); setTimeout(step,400); },300);
    } else { setTimeout(step,250); }
  }
  step();
}
function enemyAttack(atkU,defU){
  const dhex=hexAt(defU.col,defU.row);
  const defBonus=terrainDefBonus(dhex.terr);
  const atkTT=unitTT(atkU), defTT=unitTT(defU);
  const cm=counterBonus(atkTT.key,defTT.key);
  const atkApt=aptMul(atkU.gen,atkTT.key), defApt=aptMul(defU.gen,defTT.key);
  const isRanged=hexDist(atkU,defU)>1;
  const atkPower=atkU.troops*(0.30+atkU.war/300)*(0.6+atkU.train/250)*(0.5+atkU.morale/200)*atkTT.atkMul*cm*atkApt;
  const defPower=defU.troops*(0.20+defU.war/400)*(1+defBonus)*defTT.def*defApt;
  let dmg=Math.max(40,Math.floor(atkPower-defPower*0.5+(Math.random()*160-80)));
  dmg=Math.min(dmg,defU.troops); defU.troops-=dmg; defU.morale=Math.max(0,defU.morale-10);
  const big = dmg>=defU.maxTroops*0.35 || cm>1.05;
  glowUnit(atkU.col,atkU.row,'#ff8a6e',1.2); clashLine(atkU.col,atkU.row,defU.col,defU.row,'#ffb0a0');
  if(isRanged) sfx('arrow'); else sfx(big?'crit':'hit');
  hitFlash(defU.col,defU.row); popDamage(defU.col,defU.row,'-'+dmg, big?'crit':''); shake(big?'m':'s'); haptic(big?70:35);
  let msg=`[적] ${atkU.name}(${atkTT.icon}) → ${defU.name}(${defTT.icon}) · 피해 ${dmg}`;
  if(cm>1.05) msg+=' [병과우세]';
  if(defU.troops<=0){ msg+=` — ${defU.name} 궤멸!`; setTimeout(()=>{ sfx('destroy'); shake('l'); haptic(120); }, 150); }
  binfo(msg);
  renderBattle();
  // 플레이어(방어측) 각성·붕괴 체크
  if(defU.troops>0) checkHeroicRally(defU);
  checkMoraleCollapse(defU.side);
  checkBattleEnd();
}
// 적 AI 계략
function enemyStrat(key, caster, target){
  const s=STRATAGEMS[key]||STRATAGEMS.ambush;
  const rate=stratSuccessRate(caster,target);
  focusLinesFx(); sfx('crit');
  if(Math.random()>=rate){
    binfo(`[적] ${caster.name}의 ${s.icon}${s.name} — <span style="color:#8fd">아군이 간파!</span>`);
    popDamage(target.col,target.row,'간파!','');
    renderBattle(); return;
  }
  const cx=target.col, cy=target.row;
  if(key==='fire'){
    const terr=hexAt(cx,cy).terr;
    let mul=terr==='forest'?1.6:terr==='plain'?1.2:1.0;
    if(B.weatherObj && B.weatherObj.effect==='fire_boost') mul*=1.5;
    const dmg=Math.floor(target.troops*(0.25+caster.int/400)*mul);
    target.troops=Math.max(0,target.troops-dmg); target.status.burn=2; target.morale=Math.max(0,target.morale-25);
    impactFlash('red'); shake('l'); haptic(120);
    for(let i=0;i<16;i++) setTimeout(()=>spawnParticles(cx,cy,3,['#f80','#fc0'][i%2]),i*30);
    binfo(`[적] ${caster.name}의 🔥화계! ${target.name} 화염 피해 -${dmg}`);
  } else {
    const dmg=Math.floor(target.troops*(0.3+caster.int/350));
    target.troops=Math.max(0,target.troops-dmg); target.morale=Math.max(0,target.morale-35);
    slashFx(cx,cy); impactFlash(); shake('l'); haptic(110); spawnParticles(cx,cy,16,'#3a2');
    binfo(`[적] ${caster.name}의 🌿복병! ${target.name} 기습 -${dmg}`);
  }
  renderBattle();
  if(target.troops>0) checkHeroicRally(target);
  checkMoraleCollapse(target.side);
  checkBattleEnd();
}
function endEnemyPhase(){
  tickStatuses('atk'); tickStatuses('def'); // 상태이상 턴 처리(화상·혼란 등)
  B.turn++;
  B.units.forEach(u=>{ u.moved=false; u.acted=false; });
  B.phase=B.playerSide; B.duelDone=false;
  renderBattle(); renderBattleCmd();
  checkBattleEnd();
  if(B.active){ binfo('아군 페이즈. 부대를 선택하세요.'); }
  if(B.turn>12){ endBattle('timeout'); }
}

function checkBattleEnd(){
  const atkAlive=B.units.some(u=>u.side==='atk'&&u.troops>0);
  const defAlive=B.units.some(u=>u.side==='def'&&u.troops>0);
  if(!atkAlive || !defAlive){
    // 플레이어 기준 승패
    const playerAlive = playerUnits().length>0;
    endBattle(playerAlive ? 'win' : 'lose');
  }
}

// 무장 경험치·성장
function gainExp(gen, amount){
  if(!gen) return null;
  const g=G.generals.find(x=>x.id===gen.id); if(!g) return null;
  if(g.exp===undefined) g.exp=0; if(g.level===undefined) g.level=1;
  g.exp+=amount;
  let leveled=false; const gains=[];
  while(g.exp>=g.level*100 && g.level<20){
    g.exp-=g.level*100; g.level++; leveled=true;
    // 레벨업 시 능력치 상승(성격·성향 반영)
    const p=g.persona;
    const roll=Math.random();
    if(p==='brave'){ if(roll<0.6){g.war=Math.min(100,g.war+1);gains.push('무력')} else {g.lead=Math.min(100,g.lead+1);gains.push('통솔')} }
    else if(p==='wise'){ if(roll<0.6){g.int=Math.min(100,g.int+1);gains.push('지력')} else {g.pol=Math.min(100,g.pol+1);gains.push('정치')} }
    else if(p==='loyal'){ if(roll<0.5){g.lead=Math.min(100,g.lead+1);gains.push('통솔')} else {g.war=Math.min(100,g.war+1);gains.push('무력')} }
    else { const stats=['war','lead','int','pol']; const s=stats[Math.floor(Math.random()*4)]; g[s]=Math.min(100,g[s]+1); gains.push({war:'무력',lead:'통솔',int:'지력',pol:'정치'}[s]); }
  }
  return leveled? {level:g.level, gains} : null;
}
function endBattle(result){
  // 승패 효과음 (플레이어 기준)
  const playerWon = playerUnits().length>0 && result!=='lose' && result!=='retreat';
  if(result==='win'){ sfx('win'); hapticPattern([60,40,60,40,120]); }
  else if(result==='lose'){ sfx('lose'); haptic(200); }
  setBgmMode('field'); // 평시 음악 복귀
  const atk=G.cities[B.atkCity], def=G.cities[B.defCity];
  const atkRemain=B.units.filter(u=>u.side==='atk').reduce((s,u)=>s+Math.max(0,u.troops),0);
  const defRemain=B.units.filter(u=>u.side==='def').reduce((s,u)=>s+Math.max(0,u.troops),0);
  const atkGarrison=B.atkGarrison||0, defGarrison=B.defGarrison||0;
  const atkGenIds=B.units.filter(u=>u.side==='atk'&&u.gen).map(u=>u.gen.id);
  let title,msg;
  // 경험치 부여 (플레이어 측 참전 무장)
  const levelUps=[];
  const won = result==='win';
  const playerUnitsInBattle = B.units.filter(u=>u.side===B.playerSide && u.gen);
  playerUnitsInBattle.forEach(u=>{
    const base = won? 60 : 30;
    const kills = Math.floor((u.maxTroops-u.troops)/500); // 소모시킨 적 비례는 근사
    const xp = base + Math.floor(Math.random()*20);
    const lv=gainExp(u.gen, xp);
    if(lv) levelUps.push({name:u.gen.name, ...lv});
  });
  B.levelUps=levelUps;

  if(B.playerSide==='atk'){
    // === 플레이어 공격전 ===
    if(result==='win'){
      title='승리!'; msg=`${def.name}을(를) 점령했습니다! (잔여 ${atkRemain.toLocaleString()})`;
      const capturedFaction=def.owner;
      def.owner=G.playerFaction;
      atkGenIds.forEach(id=>{ const g=G.generals.find(x=>x.id===id); if(g) g.cityId=def.id; });
      def.troops=atkRemain; def.train=atk.train;
      atk.troops=atkGarrison;
      log(`${def.name} 점령! (잔여 ${atkRemain.toLocaleString()})`, true);
      // 방어측 무장을 포로로 (전투 참가했거나 도시 주둔)
      B.capturedGens = G.generals.filter(g=>g.cityId===def.id && g.faction===capturedFaction && g.faction!==G.playerFaction);
    } else if(result==='lose'){
      title='패배...'; msg=`${def.name} 공략 실패. 출병 부대가 전멸했습니다.`;
      atk.troops=atkGarrison; def.troops=defRemain;
      log(`${def.name} 공략 실패`, true);
    } else if(result==='retreat'){
      title='철수'; msg=`부대를 물렸습니다. (귀환 ${atkRemain.toLocaleString()})`;
      atk.troops=atkGarrison+atkRemain; def.troops=defRemain;
    } else {
      title='무승부'; msg='시간 초과로 부대가 귀환합니다.';
      atk.troops=atkGarrison+atkRemain; def.troops=defRemain;
    }
  } else {
    // === 플레이어 방어전 ===
    const atkFaction = atk.owner;
    if(result==='win'){
      title='방어 성공!'; msg=`${def.name}을(를) 지켜냈습니다! (잔여 ${defRemain.toLocaleString()})`;
      def.troops=defGarrison+defRemain; // 수비 잔여 + 미출전 주둔군
      atk.troops=Math.floor(atkRemain*0.6); // 공격군 후퇴 손실
      log(`${def.name} 방어 성공! (${G.factions[atkFaction].name} 격퇴)`, true);
    } else {
      title='함락...'; msg=`${def.name}이(가) ${G.factions[atkFaction].name}에게 함락되었습니다.`;
      def.owner=atkFaction;
      // 공격군 무장이 점령지로
      B.units.filter(u=>u.side==='atk'&&u.gen).forEach(u=>{ u.gen.cityId=def.id; });
      def.troops=Math.max(300,atkRemain);
      log(`${def.name} 함락! (${G.factions[atkFaction].name}에게 상실)`, true);
    }
  }
  document.getElementById('battle').classList.remove('show');
  B.active=false;
  const after=()=>{ closeModal(); if(B.playerSide==='atk') useAction(atk.id); refresh(); checkGameEnd();
    // 레벨업 알림
    if(B.levelUps && B.levelUps.length){
      const lus=B.levelUps; B.levelUps=null;
      const body=`<div style="line-height:1.8">전투를 통해 무장이 성장했습니다!<br><br>${lus.map(l=>`<b style="color:#ffd234">${l.name}</b> Lv.${l.level} <span style="color:#8fd">(${l.gains.join('·')} 상승)</span>`).join('<br>')}</div>`;
      setTimeout(()=>showModal('⬆️ 무장 성장', body, [{label:'좋다!',cls:'primary',fn:()=>{ closeModal(); afterLevelUp(); }}]), 300);
      return;
    }
    afterLevelUp();
  };
  const afterLevelUp=()=>{
    // 포로 회유 (점령 시 방어측 무장)
    if(B.capturedGens && B.capturedGens.length){
      const caps=B.capturedGens; B.capturedGens=null;
      setTimeout(()=>showCaptiveScreen(caps, def), 300);
      return;
    }
    if(G.pendingDefense && G.pendingDefense.length){ const d=G.pendingDefense.shift(); setTimeout(()=>openDefenseFormation(d.atkId,d.defId),400); }
  };
  showModal(title, msg, [{label:'확인',cls:'primary',fn:after}]);
}

// 포로 회유 화면
function showCaptiveScreen(captives, city){
  if(!captives.length){ if(G.pendingDefense&&G.pendingDefense.length){const d=G.pendingDefense.shift();setTimeout(()=>openDefenseFormation(d.atkId,d.defId),400);} return; }
  const cap=captives[0]; // 한 명씩 처리
  const rest=captives.slice(1);
  // 회유 성공률: 인물 성격·충성 관련. 충의는 잘 안 넘어옴, 야심은 잘 넘어옴
  const persona=personaOf(cap);
  let baseRate={loyal:0.15, wise:0.45, brave:0.4, ambitious:0.65, cold:0.5, plain:0.55}[persona] || 0.45;
  // 명군주 보너스(플레이어 세력 규모 클수록)
  const myCities=G.cities.filter(c=>c.owner===G.playerFaction).length;
  baseRate=Math.min(0.9, baseRate + Math.min(0.2, myCities*0.01));
  const rate=Math.round(baseRate*100);
  const body=`<div style="text-align:center;line-height:1.7">
    ${genPortraitSVG(cap,72)}
    <div style="margin:6px 0"><b style="color:${personaColor(cap)};font-size:16px">${cap.name}</b> <span class="pbadge" style="background:${personaColor(cap)}">${personaLabel(cap)}</span></div>
    <div style="font-size:12px;color:#b8a878">무${cap.war} 통${cap.lead} 지${cap.int} 정${cap.pol}</div>
    <div style="margin-top:10px;font-size:13px">${cap.name}을(를) 사로잡았습니다.<br>회유하여 등용하시겠습니까?</div>
    <div style="margin-top:6px;font-size:12px;color:#dc6">회유 성공률 약 ${rate}%</div>
    <div style="font-size:11px;color:#888;margin-top:4px">${persona==='loyal'?'충의지사 — 회유가 매우 어렵습니다':persona==='ambitious'?'야심가 — 회유가 쉬운 편입니다':''}</div>
  </div>`;
  const next=()=> showCaptiveScreen(rest, city);
  showModal('⛓️ 포로', body, [
    {label:'참수',cls:'',fn:()=>{ closeModal();
      cap.dead=true; G.generals=G.generals.filter(g=>g.id!==cap.id);
      log(`${cap.name}을(를) 참수했다.`, true); toast(`${cap.name} 참수`); next(); }},
    {label:'석방',cls:'',fn:()=>{ closeModal();
      // 석방: 인접 타 세력 도시나 재야로
      log(`${cap.name}을(를) 석방했다.`); toast(`${cap.name} 석방`);
      const others=G.cities.filter(c=>c.owner>=0 && c.owner!==G.playerFaction);
      if(others.length){ const c=others[Math.floor(Math.random()*others.length)]; cap.cityId=c.id; cap.faction=c.owner; }
      next(); }},
    {label:'회유',cls:'primary',fn:()=>{ closeModal();
      if(Math.random()<baseRate){
        cap.faction=G.playerFaction; cap.cityId=city.id;
        sfx('win'); haptic(80);
        showModal('등용 성공!', `<div style="text-align:center;line-height:1.7">${genPortraitSVG(cap,64)}<br><b style="color:#8fd">${cap.name}</b>이(가) 그대에게 충성을 맹세했습니다!<br><span style="font-size:12px;color:#dca">"${genLine(cap,'battle')}"</span></div>`,
          [{label:'좋다!',cls:'primary',fn:()=>{ closeModal(); refresh(); next(); }}]);
        log(`${cap.name} 등용 성공!`, true);
      } else {

          [{label:'참수',cls:'',fn:()=>{ closeModal(); cap.dead=true; G.generals=G.generals.filter(g=>g.id!==cap.id); log(`${cap.name} 참수`, true); next(); }},
           {label:'석방',cls:'primary',fn:()=>{ closeModal();
             const others=G.cities.filter(c=>c.owner>=0 && c.owner!==G.playerFaction);
             if(others.length){ const c=others[Math.floor(Math.random()*others.length)]; cap.cityId=c.id; cap.faction=c.owner; }

}

// 등장연도가 된 무장을 성장시켜 등장
function checkDebutGenerals(){
  if(!G.pendingGenerals || !G.pendingGenerals.length) return;
  const nowDue = G.pendingGenerals.filter(p=>p.debut<=G.year);
  if(!nowDue.length) return;
  const newcomers=[];
  nowDue.forEach(p=>{
    let targetCity = -1;
    const origCity = G.cities[p.cityId];
    if(origCity && origCity.owner>=0){
      targetCity = p.cityId;
    } else {
      const facCities = G.cities.filter(c=>c.owner===p.faction);
      if(facCities.length) targetCity = facCities[Math.floor(Math.random()*facCities.length)].id;
    }
    if(targetCity<0) return;
    const city=G.cities[targetCity];
    const g={ id:p.id, name:p.name, war:p.war, lead:p.lead, int:p.int, pol:p.pol,
      faction:city.owner, cityId:targetCity, apt:p.apt, persona:p.persona, dead:false };
    G.generals.push(g);
    newcomers.push({name:p.name, city:city.name, faction:city.owner});
  });
  G.pendingGenerals = G.pendingGenerals.filter(p=>p.debut>G.year);
  const playerNew = newcomers.filter(n=>n.faction===G.playerFaction);
  if(playerNew.length){
    const names=playerNew.map(n=>n.name).join(', ');
    const showDebut=()=>{
      if(B.active){ setTimeout(showDebut, 800); return; }
      showModal('🎋 새로운 인재 등장!',
        `<div style="line-height:1.8"><b style="color:#d4af37">${G.year}년</b>, 그대의 세력에 젊은 인재가 등장했습니다.<br><br>
        ${playerNew.map(n=>`<b style="color:#8fd">${n.name}</b> — ${n.city}`).join('<br>')}<br><br>
        <span style="font-size:12px;color:#999">이제 이들을 전장에 내보낼 수 있습니다.</span></div>`,
        [{label:'확인',cls:'primary',fn:closeModal}]);
    };
    setTimeout(showDebut, 400);
    log(`${G.year}년 — 새 인재 등장: ${names}`, true);
  } else if(newcomers.length){
    log(`${G.year}년 — ${newcomers.map(n=>n.name).join(', ')} 등장(타 세력)`);
  }
}

function endTurn(){
  // 세금/수확 결산
  for(const c of G.cities){
    const taxG = Math.floor(c.comm*0.5*(c.order/100));
    c.gold += taxG;
    if(G.month===9){ // 9월 수확
      const harvest=Math.floor(c.agri*2*(c.order/100));
      c.food+=harvest;
    }
    // 군량 소비
    c.food = Math.max(0, c.food - Math.floor(c.troops*0.02));
    // 치안 자연 변동
    if(c.order<50) c.order=Math.max(0,c.order-1);
  }
  // AI 세력 행동
  runAI();
  // 날짜 진행
  const prevYear=G.year;
  G.month++; if(G.month>12){ G.month=1; G.year++; }
  G.turn++;
  if(G.year>prevYear) checkDebutGenerals(); // 새해에 성장 무장 등장
  G.actionsLeft={};
  // 승패 판정
  checkGameEnd();
  refresh();
  if(G.selectedCity!=null) selectCity(G.selectedCity);
  log(`—— ${G.year}년 ${G.month}월 ——`);
  autoSave();
  // 연합 붕괴 시점 도달
  const breakDue = G.alliance && G.alliance.active && G.turn>=G.alliance.endTurn && !G.eventFlags.allianceBroken;
  // 플레이어 방어전 발생 시 수비 편성 (붕괴 이벤트보다 먼저)
  if(G.pendingDefense && G.pendingDefense.length){
    const d=G.pendingDefense.shift();
    setTimeout(()=>openDefenseFormation(d.atkId, d.defId), 500);
  } else if(breakDue){
    setTimeout(()=>allianceBreakEvent(), 500);
  }
}

/* ============================================================
   외교 시스템
   ============================================================ */
function diploKey(a,b){ return a<b? a+'-'+b : b+'-'+a; }
function getDiplo(a,b){
  if(a===b) return {relation:100, pact:'self'};
  const k=diploKey(a,b);
  if(!G.diplomacy[k]) G.diplomacy[k]={relation:0, pact:'none', pactEnd:0};
  return G.diplomacy[k];
}
function setPact(a,b,pact,turns){
  const d=getDiplo(a,b); d.pact=pact; d.pactEnd=G.turn+(turns||12);
  if(pact==='alliance') d.relation=Math.min(100,d.relation+30);
  else if(pact==='nonaggression') d.relation=Math.min(100,d.relation+15);
}
function areAllied(a,b){ const d=getDiplo(a,b); return d.pact==='alliance' && G.turn<d.pactEnd; }
function hasNonaggression(a,b){ const d=getDiplo(a,b); return (d.pact==='nonaggression'||d.pact==='alliance') && G.turn<d.pactEnd; }
function pactLabel(p){ return {none:'중립', nonaggression:'불가침', alliance:'동맹', self:'—'}[p]||'중립'; }

// 플레이어 외교 화면
function showDiplomacy(){
  const others=G.factions.filter((f,i)=>i!==G.playerFaction && f.alive && G.cities.some(c=>c.owner===i));
  if(!others.length){ toast('외교할 세력이 없습니다'); return; }
  let body=`<div style="font-size:12px;color:#b8a878;margin-bottom:8px">타 세력과의 관계. 불가침·동맹을 제안할 수 있습니다.</div>`;
  others.forEach(f=>{
    const fid=G.factions.indexOf(f);
    const d=getDiplo(G.playerFaction,fid);
    const active=(d.pact!=='none'&&G.turn<d.pactEnd);
    const relColor=d.relation>30?'#6c6':d.relation<-30?'#e66':'#dc6';
    const relTxt=d.relation>30?'우호':d.relation<-30?'적대':'중립';
    const info=FACTION_INFO[fid]||{name:f.name};
    body+=`<div class="listitem" style="flex-wrap:wrap">
      <b style="color:#d4af37">${info.name}</b>
      <span style="margin-left:auto;color:${relColor};font-size:12px">${relTxt}(${d.relation}) · ${active?pactLabel(d.pact)+' '+(d.pactEnd-G.turn)+'턴':'관계없음'}</span>
      <div style="width:100%;display:flex;gap:6px;margin-top:6px">
        <button class="dip-btn" onclick="proposePact(${fid},'nonaggression')" ${active?'disabled':''}>불가침 제안</button>
        <button class="dip-btn" onclick="proposePact(${fid},'alliance')" ${active&&d.pact==='alliance'?'disabled':''}>동맹 제안</button>
      </div></div>`;
  });
  showModal('🕊️ 외교', body, [{label:'닫기',cls:'primary',fn:closeModal}]);
}
function proposePact(fid, pact){
  const d=getDiplo(G.playerFaction, fid);
  // 수락 확률: 관계 + 상대 세력 규모(약하면 잘 받음) + 선물 여지
  const myPower=factionPower(G.playerFaction), theirPower=factionPower(fid);
  let rate = 0.4 + d.relation/200 + (myPower-theirPower)/(myPower+theirPower)*0.3;
  if(pact==='alliance') rate-=0.15; // 동맹은 더 어려움
  rate=Math.max(0.1,Math.min(0.9,rate));
  closeModal();
  setTimeout(()=>{
    if(Math.random()<rate){
      setPact(G.playerFaction,fid,pact,12);
      sfx('win');
      showModal('외교 성립', `<div style="text-align:center;line-height:1.7">${FACTION_INFO[fid]?FACTION_INFO[fid].name:G.factions[fid].name}와(과) <b style="color:#8fd">${pactLabel(pact)}</b>을 맺었습니다.<br><span style="font-size:12px;color:#999">${pact==='alliance'?'동맹군으로서 서로 돕습니다.':'12턴간 서로 공격하지 않습니다.'}</span></div>`,
        [{label:'좋다',cls:'primary',fn:()=>{closeModal();showDiplomacy();}}]);
      log(`${G.factions[fid].name}와(과) ${pactLabel(pact)} 체결!`, true);
    } else {
      getDiplo(G.playerFaction,fid).relation=Math.max(-100,d.relation-5);
      sfx('lose');
      showModal('외교 결렬', `<div style="text-align:center;line-height:1.7">${FACTION_INFO[fid]?FACTION_INFO[fid].name:G.factions[fid].name}이(가) 제안을 거절했습니다.<br><span style="font-size:12px;color:#c88">"지금은 그럴 때가 아니오."</span></div>`,
        [{label:'물러난다',cls:'primary',fn:()=>{closeModal();showDiplomacy();}}]);
    }
  }, 300);
}
function factionPower(fid){
  const cities=G.cities.filter(c=>c.owner===fid);
  const troops=cities.reduce((s,c)=>s+c.troops,0);
  const gens=G.generals.filter(g=>g.faction===fid).length;
  return cities.length*1000 + troops*0.3 + gens*200;
}
// AI 외교 판단 (매턴)
function runDiplomacyAI(){
  const alive=G.factions.map((f,i)=>i).filter(i=>G.factions[i].alive && G.cities.some(c=>c.owner===i));
  // pact 만료 정리
  Object.values(G.diplomacy).forEach(d=>{ if(d.pact!=='none' && G.turn>=d.pactEnd){ d.pact='none'; } });
  // AI끼리 약한 세력이 강한 세력에 불가침 요청 (플레이어 제외 자동)
  for(const a of alive){
    if(a===G.playerFaction) continue;
    for(const b of alive){
      if(b<=a || b===G.playerFaction) continue;
      const d=getDiplo(a,b);
      if(d.pact==='none' && Math.random()<0.04){
        // 관계 좋으면 불가침
        if(d.relation>10 || Math.random()<0.3){ setPact(a,b,'nonaggression',10); }
      }
      // 배신: 동맹/불가침 중이라도 강한 쪽이 약한 쪽을 낮은 확률로 파기
      if(hasNonaggression(a,b) && Math.random()<0.02){
        const pa=factionPower(a), pb=factionPower(b);
        if(Math.abs(pa-pb)/(pa+pb) > 0.4){ // 세력차 크면 배신
          d.pact='none'; d.relation-=30;
          const strong = pa>pb?a:b;
          if(strong===a||strong===b){ log(`${G.factions[strong].name}이(가) 맹약을 파기했다!`); }
        }
      }
    }
  }
}

function runAI(){
  G.pendingDefense=[]; // 플레이어가 방어할 전투 큐
  runDiplomacyAI(); // 외교 판단
  for(const f of G.factions){
    if(!f.alive || f.id===G.playerFaction) continue;
    const cities=G.cities.filter(c=>c.owner===f.id);
    if(!cities.length){ f.alive=false; continue; }
    for(const c of cities){
      // 간단 내정
      if(c.gold>250 && Math.random()<0.6){
        if(c.troops<8000 && Math.random()<0.5){ const n=Math.min(3000,Math.floor(c.pop*0.05)); c.troops+=n; c.pop-=n; c.gold-=200; }
        else { c.comm+=15; c.gold-=100; }
      }
      // 공격 판단
      if(c.troops>6000 && Math.random()<0.25){
        let tg=c.links.map(l=>G.cities[l]).filter(t=>t.owner!==f.id);
        // 외교: 불가침·동맹 중인 세력은 공격 안 함
        tg=tg.filter(t=>t.owner===-1 || !hasNonaggression(f.id, t.owner));
        // 연합 규칙: 활성 중이면 동탁 외 세력끼리 불가침(동탁·공백지만 공격)
        if(G.alliance && G.alliance.active){
          if(f.id===G.alliance.target){
            // 동탁: 아무나 공격 가능 (제한 없음)
          } else {
            // 연합 참여 세력: 동탁 또는 공백지만
            tg=tg.filter(t=>t.owner===G.alliance.target || t.owner===-1);
          }
        }
        if(tg.length){
          const t=tg[Math.floor(Math.random()*tg.length)];
          if(t.owner===G.playerFaction){
            if(G.pendingDefense.length===0) G.pendingDefense.push({atkId:c.id, defId:t.id, fid:f.id});
          } else {
            autoResolveBattle(c,t,f.id);
          }
        }
      }
    }
  }
}
function autoResolveBattle(atk,def,fid){
  const ap=atk.troops*(1+Math.random()*0.4);
  const dp=def.troops*(1+Math.random()*0.4)*1.15; // 방어 보정 + 공백지는 dp=0
  if(ap>dp){
    def.owner=fid; def.troops=Math.max(300,Math.floor(atk.troops*0.5));
    atk.troops=Math.floor(atk.troops*0.4);
  } else {
    atk.troops=Math.floor(atk.troops*0.6); def.troops=Math.floor(def.troops*0.8);
  }
}

function checkGameEnd(){
  for(const f of G.factions){ f.alive = G.cities.some(c=>c.owner===f.id); }
  const alive=G.factions.filter(f=>f.alive);
  if(!G.factions[G.playerFaction].alive){
    showEnding('defeat'); return;
  }
  const myCities=G.cities.filter(c=>c.owner===G.playerFaction).length;
  const totalCities=G.cities.length;
  // 천하통일
  if(alive.length===1 && alive[0].id===G.playerFaction){
    showEnding('unify'); return;
  }
  // 패권 (전체 도시의 2/3 이상)
  if(myCities >= Math.ceil(totalCities*2/3) && !G.eventFlags.hegemonyShown){
    G.eventFlags.hegemonyShown=true;
    showModal('🏆 패권 확립', `<div style="text-align:center;line-height:1.8">천하 도시의 3분의 2를 차지했습니다!<br>사실상 천하를 손에 넣었습니다.<br><br><span style="font-size:12px;color:#999">완전한 통일까지 계속하거나, 여기서 마무리할 수 있습니다.</span></div>`,
      [{label:'계속 정복',cls:'',fn:closeModal},{label:'천하 제패 선언',cls:'primary',fn:()=>showEnding('hegemony')}]);
  }
}
function showEnding(type){
  const pf=G.factions[G.playerFaction];
  const info=FACTION_INFO[G.playerFaction]||{name:pf.name};
  const myGens=G.generals.filter(g=>g.faction===G.playerFaction);
  const topGens=myGens.sort((a,b)=>(b.war+b.lead+b.int+b.pol)-(a.war+a.lead+a.int+a.pol)).slice(0,3);
  const years=G.year-(SCENARIOS[G.scenario]?SCENARIOS[G.scenario].year:190);
  let title,poem,color;
  if(type==='unify'){
    title='⚔️ 天下統一'; color='#ffd234';
    poem=`${info.name}의 깃발 아래\n마침내 천하가 하나로 통일되었다.\n\n난세는 끝나고, 새로운 시대가 열린다.\n그대의 이름은 청사(靑史)에 길이 남으리라.`;
  } else if(type==='hegemony'){
    title='🏆 覇權 確立'; color='#e8c874';
    poem=`${info.name}이(가) 천하의 패자가 되었다.\n\n남은 군웅은 그 위세에 무릎 꿇고\n중원에 오직 하나의 깃발만이 나부낀다.`;
  } else {
    title='💀 敗亡'; color='#c88';
    poem=`${info.name}의 대업은 여기서 끝났다.\n\n난세에 스러진 수많은 영웅처럼\n그대의 이름도 역사의 뒤안길로 사라진다.\n\n그러나 그 뜻만은 잊히지 않으리라.`;
  }
  const body=`<div style="text-align:center;line-height:1.9">
    <div style="white-space:pre-line;font-style:italic;color:#d8c8a8;font-size:14px;margin-bottom:14px">${poem}</div>
    <div style="border-top:1px solid #5a4a2a;padding-top:10px;font-size:12px;color:#b8a878">
      경과: ${years}년 · 최종 ${G.cities.filter(c=>c.owner===G.playerFaction).length}개 도시<br>
      ${type!=='defeat'?`함께한 명장: ${topGens.map(g=>g.name).join(', ')}`:''}
    </div>
  </div>`;
  if(type!=='defeat'){ sfx('win'); hapticPattern([80,50,80,50,150]); }
  else { sfx('lose'); }
  showModal(title, body, [{label:'새로운 천하로',cls:'primary',fn:()=>location.reload()}]);
}

function log(msg, hi){
  const el=document.getElementById('msglist');
  const d=document.createElement('div'); d.className='m'+(hi?' hi':'');
  d.innerHTML=`<span class="mt">${G.year}.${G.month}</span>${msg}`;
  el.prepend(d);
  while(el.children.length>60) el.removeChild(el.lastChild);

  const strip=document.getElementById('msgstrip'); if(strip) strip.scrollTop=0;
}
let toastT;
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200);
}

     }}]);
}
// 자동 저장 (매 턴 종료 시)
function autoSave(){
  try{
    const data={ turn:G.turn, year:G.year, month:G.month, playerFaction:G.playerFaction,
      cities:G.cities, factions:G.factions, generals:G.generals, actionsLeft:G.actionsLeft,
      alliance:G.alliance, eventFlags:G.eventFlags, scenario:G.scenario, pendingGenerals:G.pendingGenerals, diplomacy:G.diplomacy,
      savedAt:new Date().toISOString(), auto:true };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  }catch(e){}
}

function renderAll(){ renderMap(); renderTop(); }
function refresh(){ renderMap(); renderTop(); if(G.selectedCity!=null && !document.getElementById('bottom').classList.contains('hidden')) selectCity(G.selectedCity); }

/* ---------- 시작: 세력 선택 / 이어하기 ---------- */
// 플레이 가능 세력 정보 (군주 있는 세력) + 난이도
// 세력 기본 정보 (시나리오 무관 공통 특징)
const FACTION_INFO = {
  0:{name:'조조', desc:'중원의 요충지. 인재가 풍부한 균형형 세력.'},
  1:{name:'동탁', desc:'최강 무력(여포)과 대군. 사방이 적.'},
  2:{name:'원소', desc:'하북의 명문가. 맹장 안량·문추.'},
  4:{name:'손씨', desc:'강동의 호랑이. 손견·손책·손권으로 이어지는 강병.'},
  5:{name:'원술', desc:'회남의 대세력. 병력은 많으나 인망이 부족.'},
  6:{name:'유표', desc:'형주의 넓은 기반. 수성형.'},
  7:{name:'공손찬', desc:'백마의종 기병. 유비 삼형제와 조운.'},
  9:{name:'유언/유장', desc:'익주의 험준한 분지. 안전한 후방.'},
  10:{name:'도겸/유비', desc:'서주. 인의의 기치.'},
};
function boot(){
  initMapControls();
  showOpening();
}
// 오프닝 화면
const OPENING_POEM = `천하대세는 나뉜 지 오래면 반드시 합하고
합한 지 오래면 반드시 나뉘는 법.

후한의 기울어진 하늘 아래
영웅들이 저마다 창을 들고 일어서니

그대는 어느 깃발을 들 것인가.`;
function showOpening(){
  const op=document.getElementById('opening');
  const poem=document.getElementById('opPoem');
  if(!op){ afterOpening(); return; }
  // 타자 효과로 시 출력
  poem.textContent='';
  let i=0; const txt=OPENING_POEM;
  const startTyping=()=>{
    const iv=setInterval(()=>{
      poem.textContent=txt.slice(0,i++);
      if(i>txt.length){ clearInterval(iv); }
    }, 45);
  };
  setTimeout(startTyping, 2000); // 제목 뜬 뒤 시작
}
function closeOpening(){
  ensureAudio();
  const op=document.getElementById('opening');
  if(op){ op.classList.add('gone'); setTimeout(()=>{ op.style.display='none'; }, 1000); }
  afterOpening();
}
function afterOpening(){
  const hasSave=!!localStorage.getItem(SAVE_KEY);
  if(hasSave){ showFactionOrContinue(); }
  else { showScenarioSelect(); }
}
function showFactionOrContinue(){
  showModal('群雄割據', `<div style="line-height:1.7">저장된 게임이 있습니다.<br>이어서 하거나 새 시나리오를 시작할 수 있습니다.</div>`,
    [{label:'새 게임',cls:'',fn:()=>{ closeModal(); showScenarioSelect(); }},
     {label:'이어하기',cls:'primary',fn:()=>{ closeModal(); startFresh(); doLoadDirect(); }}]);
}
// 시나리오 선택 화면
function showScenarioSelect(){
  ensureAudio(); // 사용자 제스처로 오디오 활성화
  let body=`<div style="font-size:13px;color:#b8a878;margin-bottom:10px">플레이할 시나리오를 선택하세요.</div>`;
  const sorted=Object.entries(SCENARIOS).sort((a,b)=> a[1].year-b[1].year);
  for(const [key,s] of sorted){
    body+=`<div class="fac-pick" onclick="pickScenario('${key}')">
      <div class="fac-head"><b>${s.name}</b> <span style="color:#dc6;font-size:12px">${s.year}년</span></div>
      <div class="fac-desc">${s.desc}</div></div>`;
  }
  showModal('시나리오 선택', body, []);
}
let PENDING_SCENARIO='s190';
function pickScenario(key){
  PENDING_SCENARIO=key;
  closeModal();
  showFactionSelect(key);
}
function showFactionSelect(scnKey){
  const scn=SCENARIOS[scnKey]||SCENARIOS['s190'];
  // 시나리오의 playable 세력 각각의 시작 도시·병력 계산
  let body=`<div style="font-size:13px;color:#b8a878;margin-bottom:10px">${scn.year}년 · ${scn.name}. 플레이할 세력을 선택하세요.</div>`;
  scn.playable.forEach(fid=>{
    const info=FACTION_INFO[fid]||{name:FACTIONS[fid]?FACTIONS[fid].name:'?',desc:''};
    // 시나리오 오버라이드 이름 우선
    const dispName = (scn.factionNames && scn.factionNames[fid]) ? scn.factionNames[fid] : info.name;
    // 이 시나리오에서 해당 세력의 도시 수 추정
    const cityCount=estimateCityCount(scn, fid);
    const diff = cityCount>=6?'쉬움':cityCount>=3?'보통':'어려움';
    const diffColor={'쉬움':'#6c6','보통':'#dc6','어려움':'#e66'}[diff];
    body+=`<div class="fac-pick" onclick="chooseFaction(${fid})">
      <div class="fac-head"><b>${dispName}</b> <span style="color:${diffColor};font-size:12px">난이도 ${diff}</span>
        <span style="margin-left:auto;color:#888;font-size:12px">도시 ${cityCount}</span></div>
      <div class="fac-desc">${info.desc}</div></div>`;
  });
  showModal(`세력 선택 — ${scn.name}`, body,
    [{label:'← 시나리오',cls:'',fn:()=>{ closeModal(); showScenarioSelect(); }}]);
}
// 시나리오에서 특정 세력의 시작 도시 수 추정
function estimateCityCount(scn, fid){
  const nameToDefault={}; CITY_DEFS.forEach(c=>nameToDefault[c.name]=c.owner);
  const owners={};
  CITY_DEFS.forEach(c=>{ owners[c.name]=c.owner; });
  if(scn.cityOwner){ for(const [n,o] of Object.entries(scn.cityOwner)) owners[n]=o; }
  return Object.values(owners).filter(o=>o===fid).length;
}
function chooseFaction(fid){
  closeModal();
  startFresh();
  init(PENDING_SCENARIO, fid);
  // 최초 플레이 시 튜토리얼
  if(!localStorage.getItem('sam_tutorial_done')){
    setTimeout(showTutorial, 900);
  }
}
const TUTORIAL_STEPS=[
  {t:'⚔️ 群雄割據에 오신 것을 환영합니다', b:'그대는 한 세력의 군주가 되어 천하 통일을 노립니다. 먼저 기본을 익혀봅시다.'},
  {t:'🏙️ 도시 경영', b:'지도의 도시를 탭하면 하단에 명령이 열립니다.<br><br>🌾농업·💰상업으로 금과 군량을 늘리고, ⚔️징병으로 병력을, 🏋️훈련으로 정예도를 올립니다. 각 버튼에 예상 효과가 표시됩니다.'},
  {t:'🔥 출병과 전투', b:'도시에서 🔥출병·공격으로 인접 적 도시를 칩니다.<br><br>무장·병과(🐎기병 🛡️보병 🏹궁병)·병력을 편성해 헥스 전장에서 싸웁니다. 기병>보병>궁병>기병 상성이 있습니다.'},
  {t:'⚔️ 일기토와 🎋 계략', b:'무장끼리 인접하면 일기토로 승부를 걸 수 있고, 지력 높은 무장은 화계·복병 같은 계략으로 대군을 무너뜨립니다.<br><br>공격 전 예상 피해가 표시됩니다.'},
  {t:'🕊️ 외교 · ⛓️ 포로', b:'상단 🕊️로 불가침·동맹을 맺어 적을 줄이고, 도시를 점령하면 적 무장을 포로로 잡아 회유할 수 있습니다.'},
  {t:'🏆 승리 조건', b:'천하의 모든 도시를 차지하면 天下統一! 도시 2/3을 넘으면 패권을 선언할 수도 있습니다.<br><br>이제 천하를 도모하십시오!'},
];
function showTutorial(step){
  step=step||0;
  const s=TUTORIAL_STEPS[step];
  const isLast=step>=TUTORIAL_STEPS.length-1;
  const btns=[
    {label:'건너뛰기',cls:'',fn:()=>{ localStorage.setItem('sam_tutorial_done','1'); closeModal(); }},
  ];
  btns.push(isLast
    ? {label:'시작!',cls:'primary',fn:()=>{ localStorage.setItem('sam_tutorial_done','1'); closeModal(); }}
    : {label:'다음 ▶',cls:'primary',fn:()=>{ closeModal(); setTimeout(()=>showTutorial(step+1),150); }});
  showModal(`${s.t}  (${step+1}/${TUTORIAL_STEPS.length})`,
    `<div style="line-height:1.8">${s.b}</div>`, btns);
}
function startFresh(){
  G.selectedCity=null; if(typeof closeBottom==='function') closeBottom();
}
function doLoadDirect(){
  const raw=localStorage.getItem(SAVE_KEY); if(!raw) return;
  try{
    const d=JSON.parse(raw);
    G.turn=d.turn; G.year=d.year; G.month=d.month; G.playerFaction=d.playerFaction;
    G.cities=d.cities; G.factions=d.factions; G.generals=d.generals;
    G.actionsLeft=d.actionsLeft||{}; G.selectedCity=null;
    G.alliance=d.alliance||{active:false,target:1,endTurn:13};
    G.eventFlags=d.eventFlags||{allianceFormed:true,allianceBroken:true};
    G.scenario=d.scenario||'s190'; G.pendingGenerals=d.pendingGenerals||[]; G.diplomacy=d.diplomacy||{};
    startBgm('field');
    renderAll(); toast('이어하기 ('+G.year+'년 '+G.month+'월)');
  }catch(e){ toast('저장 손상'); }
}
boot();

// 서비스워커 등록 (오프라인 지원)
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js').catch(err=>{
      console.log('SW 등록 실패(정적 호스팅이 아니면 정상):', err);
    });
  });
}
// 설치 프롬프트 (Android/Chrome)
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  deferredPrompt=e;
  const btn=document.getElementById('installBtn');
  if(btn) btn.classList.add('show');
});
function doInstall(){
  if(!deferredPrompt){
    // iOS 등: 수동 설치 안내
    showModal('앱으로 설치하기',
      `<div style="line-height:1.8">
        <b>홈 화면에 추가</b>하면 앱처럼 전체화면으로 실행되고 오프라인에서도 플레이할 수 있습니다.<br><br>
        <b>iPhone (Safari):</b><br>
        하단 <b>공유 버튼</b> → <b>홈 화면에 추가</b><br><br>
        <b>Android (Chrome):</b><br>
        우측 상단 <b>⋮ 메뉴</b> → <b>앱 설치</b> 또는 <b>홈 화면에 추가</b>
      </div>`,
      [{label:'확인',cls:'primary',fn:closeModal}]);
    return;
  }
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(()=>{
    deferredPrompt=null;
    const btn=document.getElementById('installBtn');
    if(btn) btn.classList.remove('show');
  });
}
// 이미 설치된 경우 버튼 숨김
window.addEventListener('appinstalled', ()=>{
  const btn=document.getElementById('installBtn');
  if(btn) btn.classList.remove('show');
  toast('앱이 설치되었습니다!');
});
// iOS이면서 미설치 상태면 설치 버튼 노출(수동 안내용)
(function(){
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  const standalone=window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if(isIOS && !standalone){
    const btn=document.getElementById('installBtn');
    if(btn) btn.classList.add('show');
  }
})();

</script>
<button id="installBtn" onclick="doInstall()">📥 앱 설치</button>
