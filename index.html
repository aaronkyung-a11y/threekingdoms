function startBattle(atkId, defId, atkPicks, defPicks){
  closeModal();
  const atk=G.cities[atkId], def=G.cities[defId];
  B.active=true; B.atkCity=atkId; B.defCity=defId; B.turn=1; B.sel=null; B.duelDone=false;
  B.playerSide = defPicks ? 'def' : 'atk'; // 플레이어가 조작하는 쪽
  B.phase = B.playerSide; // 플레이어 페이즈 먼저
  B.atkGarrison=0; B.defGarrison=0;
  // === 지형 생성: 방어 도시의 실제 지리 프로파일 반영 ===
  B.hexes=[];
  for(let col=0;col<HEX.cols;col++)for(let row=0;row<HEX.rows;row++){
    B.hexes.push({col,row,terr:'plain'});
  }
  const prof = cityTerrainProfile(def.name);
  B.terrainName = prof.label;
  // 강: 프로파일의 강 개수만큼 세로 줄기
  for(let r=0;r<prof.rivers;r++){
    let cc=2+Math.floor(Math.random()*(HEX.cols-4));
    for(let row=0;row<HEX.rows;row++){
      cc=Math.max(1,Math.min(HEX.cols-2, cc+(Math.random()<0.55?0:(Math.random()<0.5?-1:1))));
      const h=hexAt(cc,row); if(h) h.terr='river';
      if(Math.random()<0.3){ const h2=hexAt(cc+1,row); if(h2&&h2.terr==='plain') h2.terr='river'; } // 넓은 강
    }
  }
  // 산/구릉: 프로파일 hillDensity
  const hillClusters=prof.hillClusters;
  for(let k=0;k<hillClusters;k++){
    const cx=1+Math.floor(Math.random()*(HEX.cols-2)), cy=Math.floor(Math.random()*HEX.rows);
    for(const h of B.hexes){ if(Math.abs(h.col-cx)+Math.abs(h.row-cy)<=1+Math.floor(Math.random()*2) && h.terr==='plain' && Math.random()<0.75) h.terr='hill'; }
  }
  // 숲 군집
  for(let k=0;k<prof.forestClusters;k++){
    const cx=2+Math.floor(Math.random()*(HEX.cols-4)), cy=1+Math.floor(Math.random()*(HEX.rows-2));
    for(const h of B.hexes){ if(Math.abs(h.col-cx)+Math.abs(h.row-cy)<=1 && h.terr==='plain' && Math.random()<0.7) h.terr='forest'; }
  }
  // 잔여 산발
  for(const h of B.hexes){ if(h.terr==='plain' && Math.random()<prof.scatter) h.terr = Math.random()<0.5?'hill':'forest'; }

  // 세로로 고르게 배치하는 헬퍼
  const placeRows=(n)=>{ const rows=[]; for(let i=0;i<n;i++){ rows.push(Math.round((i+1)*HEX.rows/(n+1))); } return rows; };
  B.units=[];
  // === 공격측 편성 ===
  if(atkPicks && atkPicks.length){
    const total=atkPicks.reduce((s,p)=>s+p.troops,0);
    B.atkSent=total; B.atkGarrison=atk.troops-total;
    const rows=placeRows(atkPicks.length);
    atkPicks.forEach((p,i)=>{
      const g=G.generals.find(x=>x.id===p.genId);
      const u=makeUnit(g, p.troops, atk.train, 'atk', i%2, rows[i]); u.tt=p.ttype; B.units.push(u);
    });
  } else {
    const atkGens=G.generals.filter(g=>g.cityId===atkId).slice(0,4);
    const atkTroops=atk.troops; B.atkSent=atkTroops; B.atkGarrison=0;
    const rows=placeRows(Math.max(1,atkGens.length));
    atkGens.forEach((g,i)=>{ B.units.push(makeUnit(g, Math.floor(atkTroops/atkGens.length), atk.train, 'atk', i%2, rows[i])); });
    if(!atkGens.length && atkTroops>0) B.units.push(makeUnit(null, atkTroops, atk.train, 'atk', 0, Math.floor(HEX.rows/2)));
  }
  // === 방어측 편성 ===
  if(defPicks && defPicks.length){
    const total=defPicks.reduce((s,p)=>s+p.troops,0);
    B.defSent=total; B.defGarrison=def.troops-total;
    const rows=placeRows(defPicks.length);
    defPicks.forEach((p,i)=>{
      const g=G.generals.find(x=>x.id===p.genId);
      const u=makeUnit(g, p.troops, def.train, 'def', HEX.cols-1-(i%2), rows[i]); u.tt=p.ttype; B.units.push(u);
    });
  } else {
    const defGens=G.generals.filter(g=>g.cityId===defId).slice(0,4);
    const defTroops=def.troops; B.defSent=defTroops; B.defGarrison=0;
    const rows=placeRows(Math.max(1,defGens.length));
    defGens.forEach((g,i)=>{ B.units.push(makeUnit(g, Math.floor(defTroops/Math.max(1,defGens.length)), def.train, 'def', HEX.cols-1-(i%2), rows[i])); });
    if(!defGens.length && defTroops>0) B.units.push(makeUnit(null, defTroops, def.train, 'def', HEX.cols-1, Math.floor(HEX.rows/2)));
  }

  // === 우호 무장 사기 보너스 (같은 편 상성) ===
  ['atk','def'].forEach(side=>{
    const ab=allyMoraleBonus(B.units, side);
    if(ab.bonus>0){
      B.units.filter(u=>u.side===side).forEach(u=>{ u.morale=Math.min(120, u.morale+ab.bonus); });
      if(side===B.playerSide && ab.pairs.length){
        const p=ab.pairs[0];
        B.allyBondMsg = `${p.a}·${p.b} ${REL_LABEL[p.type]} — 사기 상승!`;
      }
    }
  });

  document.getElementById('battle').classList.add('show');
  const roleTxt = (B.playerSide==='def' ? `🛡️ ${def.name} 방어전` : `${atk.name}→${def.name}`) + ` · ${B.terrainName||''}`;
  document.getElementById('btitle').textContent=roleTxt;
  resetBattleView();
  renderBattle();
  // 개전 대사 (플레이어측 대표 무장)
  const leadUnit = B.units.find(u=>u.side===B.playerSide && u.gen);
  const cry = leadUnit ? genLine(leadUnit.gen, 'battle') : '';
  const sideTxt = B.playerSide==='def' ? '당신은 <b>수비측</b>입니다. ' : '';
  let intro = sideTxt;
  if(cry) intro += `<b style="color:${personaColor(leadUnit.gen)}">${leadUnit.name}: "${cry}"</b><br>`;
  if(B.allyBondMsg) intro += `<span style="color:#8fd">🤝 ${B.allyBondMsg}</span><br>`;
  intro += '부대 선택 → 이동/공격. <b>🐎기병>🛡️보병>🏹궁병</b> 상성.';
  binfo(intro);
  sfx('start'); haptic(30);
  setBgmMode('battle'); // 전투 음악
  initBattleControls();
}
function makeUnit(gen, troops, train, side, col, row){
  const tt = gen? troopType(gen) : TROOP_TYPES.inf;
  return {
    id:'u'+Math.random().toString(36).slice(2,7),
    gen, name: gen?gen.name:'병사', troops, maxTroops:troops,
    train, morale:100, side, col, row,
    moved:false, acted:false,
    war: gen?gen.war:50, lead: gen?gen.lead:50, int: gen?gen.int:50,
    tt: tt.key, // 병과 key
  };
}
function unitTT(u){ return TROOP_TYPES[u.tt] || TROOP_TYPES.inf; }
function enemySide(){ return B.playerSide==='atk'?'def':'atk'; }
function isPlayerUnit(u){ return u.side===B.playerSide; }
function playerUnits(){ return B.units.filter(u=>u.side===B.playerSide && u.troops>0); }
function enemyUnits(){ return B.units.filter(u=>u.side===enemySide() && u.troops>0); }

function terrainColor(t){
  return {plain:'#5a6b3a', forest:'#2f4a26', hill:'#7a6540', river:'#2f5a7a'}[t];
}
function terrainDefBonus(t){ return {plain:0,forest:0.2,hill:0.3,river:-0.1}[t]; }
function terrainMoveCost(t){ return {plain:1,forest:2,hill:2,river:3}[t]; }

function renderBattle(){
  const svg=document.getElementById('bsvg');
  const s=HEX.size; let h='';
  // hexes
  for(const hx of B.hexes){
    const {x,y}=axialToPixel(hx.col,hx.row);
    const pts=hexPoints(x,y,s*0.95);
    const isMove = B.sel && canMoveTo(B.sel, hx);
    const isAtk = B.sel && canAttackTo(B.sel, hx);
    let stroke='#2a2318', sw=1;
    if(isMove){ stroke='#d4af37'; sw=2; }
    if(isAtk){ stroke='#e04040'; sw=2.5; }
    h+=`<polygon class="hex" data-col="${hx.col}" data-row="${hx.row}" points="${pts}"
      fill="${terrainColor(hx.terr)}" stroke="${stroke}" stroke-width="${sw}" opacity="0.9"/>`;
  }
  // units
  for(const u of B.units){
    if(u.troops<=0) continue;
    const {x,y}=axialToPixel(u.col,u.row);
    const tt=unitTT(u);
    const col = isPlayerUnit(u)?'#3a6ea5':'#a83232';
    const ttCol = {cav:'#ff8080',inf:'#80c0ff',arc:'#80ffaa'}[u.tt];
    const selRing = (B.sel && B.sel.id===u.id)?'<circle cx="'+x+'" cy="'+y+'" r="'+(s*0.85)+'" fill="none" stroke="#fff" stroke-width="2.5"/>':'';
    h+=`<g class="hexunit" data-uid="${u.id}">
      <circle cx="${x}" cy="${y}" r="${s*0.62}" fill="${col}" stroke="${ttCol}" stroke-width="2.5" opacity="${u.acted?0.55:1}"/>
      <text class="hexunit-label" x="${x}" y="${y-6}" style="font-size:11px">${tt.icon}</text>
      <text class="hexunit-label" x="${x}" y="${y+5}">${u.name}</text>
      <text class="hexunit-label" x="${x}" y="${y+15}" style="font-size:8px">${(u.troops/1000).toFixed(1)}천</text>
      ${selRing}</g>`;
  }
  svg.innerHTML=h;
  svg.querySelectorAll('.hex').forEach(n=>{
    n.addEventListener('click',()=>onHexClick(parseInt(n.dataset.col),parseInt(n.dataset.row)));
  });
  svg.querySelectorAll('.hexunit').forEach(n=>{
    n.addEventListener('click',(e)=>{ e.stopPropagation(); onUnitClick(n.dataset.uid); });
  });
  document.getElementById('bturn').textContent=`${B.turn}턴 · ${B.phase===B.playerSide?'아군 페이즈':'적군 페이즈'}`;
}
function hexPoints(cx,cy,r){
  let p=[];
  for(let i=0;i<6;i++){ const a=Math.PI/180*(60*i); p.push((cx+r*Math.cos(a)).toFixed(1)+','+(cy+r*Math.sin(a)).toFixed(1)); }
  return p.join(' ');
}
function unitAt(col,row){ return B.units.find(u=>u.col===col&&u.row===row&&u.troops>0); }
function hexAt(col,row){ return B.hexes.find(h=>h.col===col&&h.row===row); }

function canMoveTo(u, hx){
  if(!isPlayerUnit(u)||u.moved) return false;
  if(unitAt(hx.col,hx.row)) return false;
  const d=hexDist({col:u.col,row:u.row},hx);
  return d>=1 && d<=unitTT(u).move; // 병과별 이동력 (기3/보2/궁2)
}
function canAttackTo(u, hx){
  if(!isPlayerUnit(u)||u.acted) return false;
  const tgt=unitAt(hx.col,hx.row);
  if(!tgt||tgt.side!==enemySide()) return false;
  return hexDist({col:u.col,row:u.row},hx)<=unitTT(u).range; // 궁병은 2칸 사거리
}

function onUnitClick(uid){
  if(BVIEW.dragged) return; // 지도 드래그 중엔 무시
  const u=B.units.find(x=>x.id===uid);
  if(!u||u.troops<=0) return;
  if(isPlayerUnit(u) && B.phase===B.playerSide){
    if(u.acted){ binfo(`${u.name} 부대는 이미 행동했습니다.`); return; }
    B.sel=u; sfx('select'); haptic(15); renderBattle();
    const tt=unitTT(u);
    const aptTxt=u.gen?` (${tt.name}적성 ${aptLabel(u.gen,tt.key)})`:'';
    binfo(`<b style="color:#d4af37">${u.name}</b> ${tt.icon}${tt.name}${aptTxt} · 병력 ${u.troops} · 사기 ${u.morale}<br>이동력 ${tt.move}·사거리 ${tt.range} | 노란칸=이동, 빨간칸=공격`);
    renderBattleCmd();
  } else {
    if(B.sel && canAttackTo(B.sel,{col:u.col,row:u.row})){
      maybeDuelThenAttack(B.sel,u);
    } else {
      const tt=unitTT(u);
      binfo(`[적] ${u.name} ${tt.icon}${tt.name} · 병력 ${u.troops} · 사기 ${u.morale}`);
    }
  }
}
function onHexClick(col,row){
  if(BVIEW.dragged) return;
  const hx=hexAt(col,row); if(!hx) return;
  const tgt=unitAt(col,row);
  if(tgt){ onUnitClick(tgt.id); return; }
  if(B.sel && canMoveTo(B.sel,hx)){
    B.sel.col=col; B.sel.row=row; B.sel.moved=true;
    sfx('move'); haptic(20);
    renderBattle();
    binfo(`${B.sel.name} 이동 완료. 인접 적을 공격하거나 대기하세요.`);
    renderBattleCmd();
  }
}

function renderBattleCmd(){
  const cmd=document.getElementById('bcmd'); cmd.innerHTML='';
  if(B.sel && B.phase===B.playerSide){
    const wait=document.createElement('button'); wait.className='btn'; wait.textContent='대기(행동종료)';
    wait.onclick=()=>{ B.sel.acted=true; B.sel.moved=true; B.sel=null; renderBattle(); checkPhaseEnd(); renderBattleCmd(); binfo('부대를 선택하세요.'); };
    cmd.appendChild(wait);
  }
  const end=document.createElement('button'); end.className='btn primary'; end.textContent='아군 턴 종료';
  end.onclick=endPlayerPhase; cmd.appendChild(end);
  if(B.playerSide==='atk'){
    const retreat=document.createElement('button'); retreat.className='btn'; retreat.textContent='철수';
    retreat.onclick=()=>{ showModal('철수','전투에서 철수하시겠습니까? 공격이 무효화됩니다.',
      [{label:'취소',cls:'',fn:closeModal},{label:'철수',cls:'primary',fn:()=>{closeModal();endBattle('retreat');}}]); };
    cmd.appendChild(retreat);
  }
}

// 일기토 조건 확인 후 실행 → 이후 일반 공격
function maybeDuelThenAttack(atkU, defU){
  // 양쪽 무장 존재 + 둘 다 무력 70+ + 인접(1칸) + 30% 확률
  const canDuel = atkU.gen && defU.gen && atkU.war>=70 && defU.war>=70
    && hexDist(atkU,defU)===1 && !B.duelDone;
  if(canDuel && Math.random()<0.35){
    const rel = relationBetween(atkU.name, defU.name);
    let relLine='';
    if(rel){
      if(rel.type==='foe') relLine=`<div style="color:#f66;font-size:13px;margin-bottom:6px">⚔ 숙적! 서로 물러설 수 없다 (투지 상승)</div>`;
      else if(rel.type==='rival') relLine=`<div style="color:#fc6;font-size:13px;margin-bottom:6px">🔥 숙명의 라이벌</div>`;
      else if(rel.type==='sworn'||rel.type==='lord') relLine=`<div style="color:#8fd;font-size:13px;margin-bottom:6px">${REL_LABEL[rel.type]} 관계… 창을 겨누는가</div>`;
    }
    const cry = genLine(atkU.gen,'duel');
    showModal('⚔️ 일기토!',
      `<div style="text-align:center">
        ${relLine}
        <b style="color:${personaColor(atkU.gen)}">${atkU.name}</b> <span style="font-size:11px;color:#999">${personaLabel(atkU.gen)}</span> (무력 ${atkU.war})<br>
        <span style="color:#d4af37;font-size:20px">VS</span><br>
        <b style="color:${personaColor(defU.gen)}">${defU.name}</b> <span style="font-size:11px;color:#999">${personaLabel(defU.gen)}</span> (무력 ${defU.war})<br>
        <div style="color:#dca;font-style:italic;margin:8px 0">"${cry}"</div>
        일기토를 걸어 도전하시겠습니까?<br>
        <span style="font-size:12px;color:#999">승리 시 적에 큰 타격, 패배 시 아군 피해.</span>
      </div>`,
      [{label:'일반 공격',cls:'',fn:()=>{ closeModal(); doAttack(atkU,defU); }},
       {label:'⚔️ 도전!',cls:'primary',fn:()=>{ closeModal(); doDuel(atkU,defU); }}]);
  } else {
    doAttack(atkU,defU);
  }
}

function doDuel(atkU, defU){
  sfx('duel'); hapticPattern([40,60,40,60,80]); focusLinesFx();
  // 숙적/라이벌 관계 → 호걸은 투지, 판정 보정
  const rel = relationBetween(atkU.name, defU.name);
  let aBonus=1.0, dBonus=1.0;
  if(rel && (rel.type==='foe'||rel.type==='rival')){
    if(personaOf(atkU.gen)==='brave') aBonus=1.12; // 호걸은 숙적전에서 분발
    if(personaOf(defU.gen)==='brave') dBonus=1.12;
  }
  // 무력 + 사기 + 무작위. 라운드 3회 판정
  let aScore=0, dScore=0, rounds=[];
  for(let i=0;i<3;i++){
    const a=atkU.war*aBonus*(0.7+atkU.morale/300)+Math.random()*40;
    const d=defU.war*dBonus*(0.7+defU.morale/300)+Math.random()*40;
    if(a>=d){ aScore++; rounds.push(`${i+1}합: ${atkU.name} 우세`); }
    else { dScore++; rounds.push(`${i+1}합: ${defU.name} 우세`); }
  }
  const win = aScore>dScore;
  B.duelDone=true;
  let result='';
  if(win){
    const loss=Math.min(defU.troops, Math.floor(defU.troops*0.25+300));
    defU.troops-=loss; defU.morale=Math.max(0,defU.morale-35);
    atkU.morale=Math.min(120,atkU.morale+10);
    const cry=genLine(atkU.gen,'win');
    result=`<span style="color:#8fd">${atkU.name} 승리!</span> 적 병력 -${loss}<br><span style="color:#dca;font-style:italic">"${cry}"</span>`;
    shake('l'); sfx('crit'); haptic(120); impactFlash(); slashFx(defU.col,defU.row); popDamage(defU.col,defU.row,'一騎討 勝!','crit'); hitFlash(defU.col,defU.row); spawnParticles(defU.col,defU.row,14,'#d44');
  } else {
    const loss=Math.min(atkU.troops, Math.floor(atkU.troops*0.18+200));
    atkU.troops-=loss; atkU.morale=Math.max(0,atkU.morale-25);
    defU.morale=Math.min(120,defU.morale+10);
    const cry=genLine(defU.gen,'win');
    result=`<span style="color:#f99">${defU.name} 승리...</span> 아군 병력 -${loss}<br><span style="color:#dca;font-style:italic">"${cry}"</span>`;
    shake('l'); sfx('crit'); haptic(150); impactFlash('red'); slashFx(atkU.col,atkU.row); popDamage(atkU.col,atkU.row,'一騎討 敗','counter'); hitFlash(atkU.col,atkU.row); spawnParticles(atkU.col,atkU.row,14,'#4a8ad4');
  }
  renderBattle();
  showModal('⚔️ 일기토 결과',
    `<div style="line-height:1.8">${rounds.join('<br>')}<br><br><b>${result}</b></div>`,
    [{label:'이어서 교전',cls:'primary',fn:()=>{ closeModal();
        if(atkU.troops>0 && defU.troops>0){ doAttack(atkU,defU); }
        else { atkU.acted=true; atkU.moved=true; B.sel=null; renderBattle(); checkBattleEnd(); checkPhaseEnd(); renderBattleCmd(); }
     }}]);
}

function doAttack(atkU, defU){
  const dhex=hexAt(defU.col,defU.row);
  const defBonus=terrainDefBonus(dhex.terr);
  const atkTT=unitTT(atkU), defTT=unitTT(defU);
  const counterMul=counterBonus(atkTT.key, defTT.key); // 병과 상성
  const atkApt=aptMul(atkU.gen, atkTT.key);   // 공격측 병과 적성
  const defApt=aptMul(defU.gen, defTT.key);   // 방어측 병과 적성
  const isRanged = hexDist(atkU,defU)>1; // 궁병 원거리 공격
  // 데미지: 병과 공격배율·상성·적성 반영
  const atkPower = atkU.troops*(0.35+atkU.war/300)*(0.6+atkU.train/250)*(0.5+atkU.morale/200)
    *atkTT.atkMul*counterMul*atkApt;
  const defPower = defU.troops*(0.20+defU.war/400)*(1+defBonus)*defTT.def*defApt;
  let dmg = Math.max(50, Math.floor(atkPower - defPower*0.5 + (Math.random()*200-100)));
  dmg = Math.min(dmg, defU.troops);
  defU.troops -= dmg;
  defU.morale = Math.max(0, defU.morale-12);
  // 반격: 원거리(궁병) 공격이면 반격 없음. 근접이면 반격
  let counter=0;
  if(defU.troops>0 && !isRanged){
    const dCounterMul=counterBonus(defTT.key, atkTT.key);
    counter = Math.max(20, Math.floor(defU.troops*(0.15+defU.war/400)*(0.5+defU.morale/200)*defTT.atkMul*dCounterMul*defApt + (Math.random()*100-50)));
    counter = Math.min(counter, atkU.troops);
    atkU.troops-=counter; atkU.morale=Math.max(0,atkU.morale-6);
  }
  atkU.acted=true; atkU.moved=true;
  // === 이펙트 ===
  const big = dmg >= defU.maxTroops*0.35 || counterMul>1.05;
  if(isRanged){ sfx('arrow'); } else { sfx(big?'crit':'hit'); slashFx(defU.col,defU.row); }
  hitFlash(defU.col, defU.row);
  popDamage(defU.col, defU.row, '-'+dmg, big?'crit':'');
  spawnParticles(defU.col, defU.row, big?12:6, isPlayerUnit(defU)?'#4a8ad4':'#d44');
  shake(big?'m':'s');
  haptic(big?90:45);
  if(big) impactFlash();
  if(counter>0){ setTimeout(()=>{ popDamage(atkU.col,atkU.row,'-'+counter,'counter'); hitFlash(atkU.col,atkU.row); spawnParticles(atkU.col,atkU.row,5,isPlayerUnit(atkU)?'#4a8ad4':'#d44'); sfx('hit'); haptic(30); }, 220); }
  const aptTag = atkU.gen ? ` <span style="color:#dca">${atkTT.name}${aptLabel(atkU.gen,atkTT.key)}</span>` : '';
  let msg=`<b>${atkU.name}</b>(${atkTT.icon}${aptTag}) → <b>${defU.name}</b>(${defTT.icon}) · 피해 ${dmg}`;
  if(counterMul>1.05) msg+=` <span style="color:#8fd">[병과우세]</span>`;
  else if(counterMul<0.95) msg+=` <span style="color:#f99">[병과열세]</span>`;
  if(isRanged) msg+=` <span style="color:#8fa">[원거리]</span>`;
  if(counter>0) msg+=`<br>반격 ${counter}`;
  if(defU.troops<=0){ msg+=`<br><span style="color:#d4af37">${defU.name} 부대 궤멸!</span>`;
    if(defU.gen){ const cry=genLine(defU.gen,'lose'); if(cry) msg+=`<br><span style="color:#c88;font-style:italic">${defU.name}: "${cry}"</span>`; }
    setTimeout(()=>{ sfx('destroy'); shake('l'); haptic(150); impactFlash('red'); popDamage(defU.col,defU.row,'궤멸!','crit'); spawnParticles(defU.col,defU.row,20,isPlayerUnit(defU)?'#4a8ad4':'#d44'); }, 150); }
  binfo(msg);
  B.sel=null; renderBattle(); renderBattleCmd();
  checkBattleEnd();
  checkPhaseEnd();
}

function checkPhaseEnd(){
  const alive=playerUnits();
  if(alive.length && alive.every(u=>u.acted)){
    // 모든 아군 행동 완료 → 자동으로 적 페이즈 안내(수동 종료도 가능)
  }
}
function endPlayerPhase(){
  B.phase=enemySide(); B.sel=null; renderBattle(); binfo('적군 페이즈...');
  setTimeout(enemyPhase, 500);
}
function enemyPhase(){
  const foes=enemyUnits();
  let i=0;
  function step(){
    if(i>=foes.length){ endEnemyPhase(); return; }
    const u=foes[i++];
    if(u.troops<=0){ step(); return; }
    // AI: 가장 가까운 플레이어 부대로 이동 후 공격
    const targets=playerUnits();
    if(!targets.length){ endEnemyPhase(); return; }
    let target=targets.reduce((a,b)=> hexDist(u,a)<=hexDist(u,b)?a:b);
    // 이동 (이동력만큼)
    const mv=unitTT(u).move;
    if(hexDist(u,target)>unitTT(u).range){
      for(let s=0;s<mv;s++){
        if(hexDist(u,target)<=unitTT(u).range) break;
        const nbrs=hexNeighbors(u.col,u.row).filter(n=>!unitAt(n.col,n.row));
        if(!nbrs.length) break;
        nbrs.sort((a,b)=>hexDist(a,target)-hexDist(b,target));
        u.col=nbrs[0].col; u.row=nbrs[0].row;
      }
    }
    renderBattle();
    // 공격
    if(hexDist(u,target)<=unitTT(u).range){
      setTimeout(()=>{ enemyAttack(u,target); setTimeout(step,400); },300);
    } else { setTimeout(step,250); }
  }
  step();
}
function enemyAttack(atkU,defU){
  const dhex=hexAt(defU.col,defU.row);
  const defBonus=terrainDefBonus(dhex.terr);
  const atkTT=unitTT(atkU), defTT=unitTT(defU);
  const cm=counterBonus(atkTT.key,defTT.key);
  const atkApt=aptMul(atkU.gen,atkTT.key), defApt=aptMul(defU.gen,defTT.key);
  const isRanged=hexDist(atkU,defU)>1;
  const atkPower=atkU.troops*(0.30+atkU.war/300)*(0.6+atkU.train/250)*(0.5+atkU.morale/200)*atkTT.atkMul*cm*atkApt;
  const defPower=defU.troops*(0.20+defU.war/400)*(1+defBonus)*defTT.def*defApt;
  let dmg=Math.max(40,Math.floor(atkPower-defPower*0.5+(Math.random()*160-80)));
  dmg=Math.min(dmg,defU.troops); defU.troops-=dmg; defU.morale=Math.max(0,defU.morale-10);
  const big = dmg>=defU.maxTroops*0.35 || cm>1.05;
  if(isRanged) sfx('arrow'); else sfx(big?'crit':'hit');
  hitFlash(defU.col,defU.row); popDamage(defU.col,defU.row,'-'+dmg, big?'crit':''); shake(big?'m':'s'); haptic(big?70:35);
  let msg=`[적] ${atkU.name}(${atkTT.icon}) → ${defU.name}(${defTT.icon}) · 피해 ${dmg}`;
  if(cm>1.05) msg+=' [병과우세]';
  if(defU.troops<=0){ msg+=` — ${defU.name} 궤멸!`; setTimeout(()=>{ sfx('destroy'); shake('l'); haptic(120); }, 150); }
  binfo(msg);
  renderBattle(); checkBattleEnd();
}
function endEnemyPhase(){
  B.turn++;
  B.units.forEach(u=>{ u.moved=false; u.acted=false; });
  B.phase=B.playerSide; B.duelDone=false;
  renderBattle(); renderBattleCmd();
  binfo('아군 페이즈. 부대를 선택하세요.');
  if(B.turn>12){ endBattle('timeout'); }
}

function checkBattleEnd(){
  const atkAlive=B.units.some(u=>u.side==='atk'&&u.troops>0);
  const defAlive=B.units.some(u=>u.side==='def'&&u.troops>0);
  if(!atkAlive || !defAlive){
    // 플레이어 기준 승패
    const playerAlive = playerUnits().length>0;
    endBattle(playerAlive ? 'win' : 'lose');
  }
}

function endBattle(result){
  // 승패 효과음 (플레이어 기준)
  const playerWon = playerUnits().length>0 && result!=='lose' && result!=='retreat';
  if(result==='win'){ sfx('win'); hapticPattern([60,40,60,40,120]); }
  else if(result==='lose'){ sfx('lose'); haptic(200); }
  setBgmMode('field'); // 평시 음악 복귀
  const atk=G.cities[B.atkCity], def=G.cities[B.defCity];
  const atkRemain=B.units.filter(u=>u.side==='atk').reduce((s,u)=>s+Math.max(0,u.troops),0);
  const defRemain=B.units.filter(u=>u.side==='def').reduce((s,u)=>s+Math.max(0,u.troops),0);
  const atkGarrison=B.atkGarrison||0, defGarrison=B.defGarrison||0;
  const atkGenIds=B.units.filter(u=>u.side==='atk'&&u.gen).map(u=>u.gen.id);
  let title,msg;

  if(B.playerSide==='atk'){
    // === 플레이어 공격전 ===
    if(result==='win'){
      title='승리!'; msg=`${def.name}을(를) 점령했습니다! (잔여 ${atkRemain.toLocaleString()})`;
      def.owner=G.playerFaction;
      atkGenIds.forEach(id=>{ const g=G.generals.find(x=>x.id===id); if(g) g.cityId=def.id; });
      def.troops=atkRemain; def.train=atk.train;
      atk.troops=atkGarrison;
      log(`${def.name} 점령! (잔여 ${atkRemain.toLocaleString()})`, true);
    } else if(result==='lose'){
      title='패배...'; msg=`${def.name} 공략 실패. 출병 부대가 전멸했습니다.`;
      atk.troops=atkGarrison; def.troops=defRemain;
      log(`${def.name} 공략 실패`, true);
    } else if(result==='retreat'){
      title='철수'; msg=`부대를 물렸습니다. (귀환 ${atkRemain.toLocaleString()})`;
      atk.troops=atkGarrison+atkRemain; def.troops=defRemain;
    } else {
      title='무승부'; msg='시간 초과로 부대가 귀환합니다.';
      atk.troops=atkGarrison+atkRemain; def.troops=defRemain;
    }
  } else {
    // === 플레이어 방어전 ===
    const atkFaction = atk.owner;
    if(result==='win'){
      title='방어 성공!'; msg=`${def.name}을(를) 지켜냈습니다! (잔여 ${defRemain.toLocaleString()})`;
      def.troops=defGarrison+defRemain; // 수비 잔여 + 미출전 주둔군
      atk.troops=Math.floor(atkRemain*0.6); // 공격군 후퇴 손실
      log(`${def.name} 방어 성공! (${G.factions[atkFaction].name} 격퇴)`, true);
    } else {
      title='함락...'; msg=`${def.name}이(가) ${G.factions[atkFaction].name}에게 함락되었습니다.`;
      def.owner=atkFaction;
      // 공격군 무장이 점령지로
      B.units.filter(u=>u.side==='atk'&&u.gen).forEach(u=>{ u.gen.cityId=def.id; });
      def.troops=Math.max(300,atkRemain);
      log(`${def.name} 함락! (${G.factions[atkFaction].name}에게 상실)`, true);
    }
  }
  document.getElementById('battle').classList.remove('show');
  B.active=false;
  const after=()=>{ closeModal(); if(B.playerSide==='atk') useAction(atk.id); refresh(); checkGameEnd();
    // 대기 중인 다음 방어전 처리
    if(G.pendingDefense && G.pendingDefense.length){ const d=G.pendingDefense.shift(); setTimeout(()=>openDefenseFormation(d.atkId,d.defId),400); }
  };
  showModal(title, msg, [{label:'확인',cls:'primary',fn:after}]);
}

function binfo(html){ document.getElementById('binfo').innerHTML=html; }

/* ============================================================
   턴 진행 & AI
   ============================================================ */
document.getElementById('endturn').addEventListener('click', endTurn);
function endTurn(){
  // 세금/수확 결산
  for(const c of G.cities){
    const taxG = Math.floor(c.comm*0.5*(c.order/100));
    c.gold += taxG;
    if(G.month===9){ // 9월 수확
      const harvest=Math.floor(c.agri*2*(c.order/100));
      c.food+=harvest;
    }
    // 군량 소비
    c.food = Math.max(0, c.food - Math.floor(c.troops*0.02));
    // 치안 자연 변동
    if(c.order<50) c.order=Math.max(0,c.order-1);
  }
  // AI 세력 행동
  runAI();
  // 날짜 진행
  G.month++; if(G.month>12){ G.month=1; G.year++; }
  G.turn++;
  G.actionsLeft={};
  // 승패 판정
  checkGameEnd();
  refresh();
  if(G.selectedCity!=null) selectCity(G.selectedCity);
  log(`—— ${G.year}년 ${G.month}월 ——`);
  autoSave();
  // 연합 붕괴 시점 도달
  const breakDue = G.alliance && G.alliance.active && G.turn>=G.alliance.endTurn && !G.eventFlags.allianceBroken;
  // 플레이어 방어전 발생 시 수비 편성 (붕괴 이벤트보다 먼저)
  if(G.pendingDefense && G.pendingDefense.length){
    const d=G.pendingDefense.shift();
    setTimeout(()=>openDefenseFormation(d.atkId, d.defId), 500);
  } else if(breakDue){
    setTimeout(()=>allianceBreakEvent(), 500);
  }
}

function runAI(){
  G.pendingDefense=[]; // 플레이어가 방어할 전투 큐
  for(const f of G.factions){
    if(!f.alive || f.id===G.playerFaction) continue;
    const cities=G.cities.filter(c=>c.owner===f.id);
    if(!cities.length){ f.alive=false; continue; }
    for(const c of cities){
      // 간단 내정
      if(c.gold>250 && Math.random()<0.6){
        if(c.troops<6000 && Math.random()<0.5){ const n=1500; c.troops+=n; c.gold-=200; }
        else { c.comm+=15; c.gold-=100; }
      }
      // 공격 판단
      if(c.troops>5000 && Math.random()<0.25){
        let tg=c.links.map(l=>G.cities[l]).filter(t=>t.owner!==f.id);
        // 연합 규칙: 활성 중이면 동탁 외 세력끼리 불가침(동탁·공백지만 공격)
        if(G.alliance && G.alliance.active){
          if(f.id===G.alliance.target){
            // 동탁: 아무나 공격 가능 (제한 없음)
          } else {
            // 연합 참여 세력: 동탁 또는 공백지만
            tg=tg.filter(t=>t.owner===G.alliance.target || t.owner===-1);
          }
        }
        if(tg.length){
          const t=tg[Math.floor(Math.random()*tg.length)];
          if(t.owner===G.playerFaction){
            if(G.pendingDefense.length===0) G.pendingDefense.push({atkId:c.id, defId:t.id, fid:f.id});
          } else {
            autoResolveBattle(c,t,f.id);
          }
        }
      }
    }
  }
}
function autoResolveBattle(atk,def,fid){
  const ap=atk.troops*(1+Math.random()*0.4);
  const dp=def.troops*(1+Math.random()*0.4)*1.15; // 방어 보정 + 공백지는 dp=0
  if(ap>dp){
    def.owner=fid; def.troops=Math.max(300,Math.floor(atk.troops*0.5));
    atk.troops=Math.floor(atk.troops*0.4);
  } else {
    atk.troops=Math.floor(atk.troops*0.6); def.troops=Math.floor(def.troops*0.8);
  }
}

function checkGameEnd(){
  for(const f of G.factions){ f.alive = G.cities.some(c=>c.owner===f.id); }
  const alive=G.factions.filter(f=>f.alive);
  if(!G.factions[G.playerFaction].alive){
    showModal('패망','당신의 세력이 모두 무너졌습니다. 게임 오버.',
      [{label:'다시 시작',cls:'primary',fn:()=>location.reload()}]); return;
  }
  if(alive.length===1 && alive[0].id===G.playerFaction){
    showModal('천하통일!','천하를 통일했습니다! 축하합니다.',
      [{label:'다시 시작',cls:'primary',fn:()=>location.reload()}]);
  }
}

/* ---------- 유틸 ---------- */
function log(msg, hi){
  const el=document.getElementById('msglist');
  const d=document.createElement('div'); d.className='m'+(hi?' hi':'');
  d.innerHTML=`<span class="mt">${G.year}.${G.month}</span>${msg}`;
  el.prepend(d);
  while(el.children.length>60) el.removeChild(el.lastChild);
  // 스트립은 최신이 위로 오도록 스크롤 top
  const strip=document.getElementById('msgstrip'); if(strip) strip.scrollTop=0;
}
let toastT;
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200);
}

/* ---------- 세이브 / 로드 ---------- */
const SAVE_KEY='sam_gunung_save_v1';
function doSave(){
  try{
    const data={ turn:G.turn, year:G.year, month:G.month, playerFaction:G.playerFaction,
      cities:G.cities, factions:G.factions, generals:G.generals, actionsLeft:G.actionsLeft,
      alliance:G.alliance, eventFlags:G.eventFlags, scenario:G.scenario,
      savedAt:new Date().toISOString() };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    toast('저장 완료 ('+G.year+'년 '+G.month+'월)');
    log('게임을 저장했습니다.', true);
  }catch(e){ toast('저장 실패: 저장공간 확인'); }
}
function doLoad(){
  const raw=localStorage.getItem(SAVE_KEY);
  if(!raw){ toast('저장된 게임이 없습니다'); return; }
  showModal('불러오기', '저장된 게임을 불러오면 현재 진행 상황은 사라집니다. 계속하시겠습니까?',
    [{label:'취소',cls:'',fn:closeModal},
     {label:'불러오기',cls:'primary',fn:()=>{
        try{
          const d=JSON.parse(raw);
          G.turn=d.turn; G.year=d.year; G.month=d.month; G.playerFaction=d.playerFaction;
          G.cities=d.cities; G.factions=d.factions; G.generals=d.generals;
          G.actionsLeft=d.actionsLeft||{}; G.selectedCity=null;
          G.alliance=d.alliance||{active:false,target:1,endTurn:13};
          G.eventFlags=d.eventFlags||{allianceFormed:true,allianceBroken:true};
          G.scenario=d.scenario||'s190';
          closeModal(); closeBottom(); renderAll();
          toast('불러오기 완료 ('+G.year+'년 '+G.month+'월)');
          log('저장된 게임을 불러왔습니다.', true);
        }catch(e){ closeModal(); toast('불러오기 실패: 저장 손상'); }
     }}]);
}
// 자동 저장 (매 턴 종료 시)
function autoSave(){
  try{
    const data={ turn:G.turn, year:G.year, month:G.month, playerFaction:G.playerFaction,
      cities:G.cities, factions:G.factions, generals:G.generals, actionsLeft:G.actionsLeft,
      alliance:G.alliance, eventFlags:G.eventFlags, scenario:G.scenario,
      savedAt:new Date().toISOString(), auto:true };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  }catch(e){}
}

function renderAll(){ renderMap(); renderTop(); }
function refresh(){ renderMap(); renderTop(); if(G.selectedCity!=null && !document.getElementById('bottom').classList.contains('hidden')) selectCity(G.selectedCity); }

/* ---------- 시작: 세력 선택 / 이어하기 ---------- */
// 플레이 가능 세력 정보 (군주 있는 세력) + 난이도
// 세력 기본 정보 (시나리오 무관 공통 특징)
const FACTION_INFO = {
  0:{name:'조조', desc:'중원의 요충지. 인재가 풍부한 균형형 세력.'},
  1:{name:'동탁', desc:'최강 무력(여포)과 대군. 사방이 적.'},
  2:{name:'원소', desc:'하북의 명문가. 맹장 안량·문추.'},
  4:{name:'손씨', desc:'강동의 호랑이. 손견·손책·손권으로 이어지는 강병.'},
  5:{name:'원술', desc:'회남의 대세력. 병력은 많으나 인망이 부족.'},
  6:{name:'유표', desc:'형주의 넓은 기반. 수성형.'},
  7:{name:'공손찬', desc:'백마의종 기병. 유비 삼형제와 조운.'},
  9:{name:'유언/유장', desc:'익주의 험준한 분지. 안전한 후방.'},
  10:{name:'도겸/유비', desc:'서주. 인의의 기치.'},
};
function boot(){
  initMapControls();
  const hasSave=!!localStorage.getItem(SAVE_KEY);
  if(hasSave){
    showFactionOrContinue();
  } else {
    showScenarioSelect();
  }
}
function showFactionOrContinue(){
  showModal('群雄割據', `<div style="line-height:1.7">저장된 게임이 있습니다.<br>이어서 하거나 새 시나리오를 시작할 수 있습니다.</div>`,
    [{label:'새 게임',cls:'',fn:()=>{ closeModal(); showScenarioSelect(); }},
     {label:'이어하기',cls:'primary',fn:()=>{ closeModal(); startFresh(); doLoadDirect(); }}]);
}
// 시나리오 선택 화면
function showScenarioSelect(){
  ensureAudio(); // 사용자 제스처로 오디오 활성화
  let body=`<div style="font-size:13px;color:#b8a878;margin-bottom:10px">플레이할 시나리오를 선택하세요.</div>`;
  for(const [key,s] of Object.entries(SCENARIOS)){
    body+=`<div class="fac-pick" onclick="pickScenario('${key}')">
      <div class="fac-head"><b>${s.name}</b> <span style="color:#dc6;font-size:12px">${s.year}년</span></div>
      <div class="fac-desc">${s.desc}</div></div>`;
  }
  showModal('시나리오 선택', body, []);
}
let PENDING_SCENARIO='s190';
function pickScenario(key){
  PENDING_SCENARIO=key;
  closeModal();
  showFactionSelect(key);
}
function showFactionSelect(scnKey){
  const scn=SCENARIOS[scnKey]||SCENARIOS['s190'];
  // 시나리오의 playable 세력 각각의 시작 도시·병력 계산
  let body=`<div style="font-size:13px;color:#b8a878;margin-bottom:10px">${scn.year}년 · ${scn.name}. 플레이할 세력을 선택하세요.</div>`;
  scn.playable.forEach(fid=>{
    const info=FACTION_INFO[fid]||{name:FACTIONS[fid]?FACTIONS[fid].name:'?',desc:''};
    // 이 시나리오에서 해당 세력의 도시 수 추정
    const cityCount=estimateCityCount(scn, fid);
    const diff = cityCount>=6?'쉬움':cityCount>=3?'보통':'어려움';
    const diffColor={'쉬움':'#6c6','보통':'#dc6','어려움':'#e66'}[diff];
    body+=`<div class="fac-pick" onclick="chooseFaction(${fid})">
      <div class="fac-head"><b>${info.name}</b> <span style="color:${diffColor};font-size:12px">난이도 ${diff}</span>
        <span style="margin-left:auto;color:#888;font-size:12px">도시 ${cityCount}</span></div>
      <div class="fac-desc">${info.desc}</div></div>`;
  });
  showModal(`세력 선택 — ${scn.name}`, body,
    [{label:'← 시나리오',cls:'',fn:()=>{ closeModal(); showScenarioSelect(); }}]);
}
// 시나리오에서 특정 세력의 시작 도시 수 추정
function estimateCityCount(scn, fid){
  const nameToDefault={}; CITY_DEFS.forEach(c=>nameToDefault[c.name]=c.owner);
  const owners={};
  CITY_DEFS.forEach(c=>{ owners[c.name]=c.owner; });
  if(scn.cityOwner){ for(const [n,o] of Object.entries(scn.cityOwner)) owners[n]=o; }
  return Object.values(owners).filter(o=>o===fid).length;
}
function chooseFaction(fid){
  closeModal();
  startFresh();
  init(PENDING_SCENARIO, fid);
}
function startFresh(){
  G.selectedCity=null; if(typeof closeBottom==='function') closeBottom();
}
function doLoadDirect(){
  const raw=localStorage.getItem(SAVE_KEY); if(!raw) return;
  try{
    const d=JSON.parse(raw);
    G.turn=d.turn; G.year=d.year; G.month=d.month; G.playerFaction=d.playerFaction;
    G.cities=d.cities; G.factions=d.factions; G.generals=d.generals;
    G.actionsLeft=d.actionsLeft||{}; G.selectedCity=null;
    G.alliance=d.alliance||{active:false,target:1,endTurn:13};
    G.eventFlags=d.eventFlags||{allianceFormed:true,allianceBroken:true};
    G.scenario=d.scenario||'s190';
    startBgm('field');
    renderAll(); toast('이어하기 ('+G.year+'년 '+G.month+'월)');
  }catch(e){ toast('저장 손상'); }
}
boot();

/* ============================================================
   PWA: 서비스워커 등록 + 설치 프롬프트
   ============================================================ */
// 서비스워커 등록 (오프라인 지원)
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js').catch(err=>{
      console.log('SW 등록 실패(정적 호스팅이 아니면 정상):', err);
    });
  });
}
// 설치 프롬프트 (Android/Chrome)
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  deferredPrompt=e;
  const btn=document.getElementById('installBtn');
  if(btn) btn.classList.add('show');
});
function doInstall(){
  if(!deferredPrompt){
    // iOS 등: 수동 설치 안내
    showModal('앱으로 설치하기',
      `<div style="line-height:1.8">
        <b>홈 화면에 추가</b>하면 앱처럼 전체화면으로 실행되고 오프라인에서도 플레이할 수 있습니다.<br><br>
        <b>iPhone (Safari):</b><br>
        하단 <b>공유 버튼</b> → <b>홈 화면에 추가</b><br><br>
        <b>Android (Chrome):</b><br>
        우측 상단 <b>⋮ 메뉴</b> → <b>앱 설치</b> 또는 <b>홈 화면에 추가</b>
      </div>`,
      [{label:'확인',cls:'primary',fn:closeModal}]);
    return;
  }
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(()=>{
    deferredPrompt=null;
    const btn=document.getElementById('installBtn');
    if(btn) btn.classList.remove('show');
  });
}
// 이미 설치된 경우 버튼 숨김
window.addEventListener('appinstalled', ()=>{
  const btn=document.getElementById('installBtn');
  if(btn) btn.classList.remove('show');
  toast('앱이 설치되었습니다!');
});
// iOS이면서 미설치 상태면 설치 버튼 노출(수동 안내용)
(function(){
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  const standalone=window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if(isIOS && !standalone){
    const btn=document.getElementById('installBtn');
    if(btn) btn.classList.add('show');
  }
})();

</script>
<button id="installBtn" onclick="doInstall()">📥 앱 설치</button>
</body>
</html>
